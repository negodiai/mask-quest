        // Функция для показа всплывающего уведомления
        let toastTimeout = null;
        
        function showToast(message, type = 'success') {
            // Удаляем предыдущее уведомление
            const existingToast = document.querySelector('.toast-notification');
            if (existingToast) {
                existingToast.remove();
            }
            if (toastTimeout) {
                clearTimeout(toastTimeout);
            }
            
            // Создаём новое уведомление
            const toast = document.createElement('div');
            toast.className = `toast-notification toast-${type}`;
            
            // Выбираем иконку в зависимости от типа
            let icon = '';
            if (type === 'success') {
                icon = '<i class="fas fa-check-circle" style="font-size: 18px;"></i>';
            } else if (type === 'error') {
                icon = '<i class="fas fa-exclamation-circle" style="font-size: 18px;"></i>';
            } else if (type === 'warning') {
                icon = '<i class="fas fa-exclamation-triangle" style="font-size: 18px;"></i>';
            } else {
                icon = '<i class="fas fa-info-circle" style="font-size: 18px;"></i>';
            }
            
            toast.innerHTML = `${icon} <span>${message}</span>`;
            document.body.appendChild(toast);
            
            // Автоматически удаляем через 3 секунды
            toastTimeout = setTimeout(() => {
                if (toast && toast.remove) {
                    toast.remove();
                }
            }, 3000);
        }
        
        // Получаем userId из Telegram

                // Отключаем сворачивание приложения свайпом вниз
            if (typeof tg.disableVerticalSwipes === 'function') {
                tg.disableVerticalSwipes();
            }
                
                const user = tg.initDataUnsafe?.user;
                if (user && user.id) {
                    currentUserId = user.id.toString();

            if (!currentUserId) {
                currentUserId = 'test_user_' + Date.now();

            console.log('User ID:', currentUserId);

        // Загрузка начальных данных

                return appState.routes.filter(route => route.isCompleted === true);
            } else if (currentFilter === 'uncompleted') {

            return appState.routes;

        function checkAchievements() {

            // Подсчёт масок по категориям (для историка и современника)

            const pastMasks = ['mask_1', 'mask_2', 'mask_3', 'mask_4', 'mask_5'];
            const presentMasks = ['mask_6', 'mask_7', 'mask_8', 'mask_9', 'mask_10'];
            
            const activatedMaskIds = new Set(appState.activations.map(a => a.mask?.id).filter(Boolean));
            
            const pastActivated = pastMasks.filter(id => activatedMaskIds.has(id)).length;
            const presentActivated = presentMasks.filter(id => activatedMaskIds.has(id)).length;
            const totalPast = pastMasks.length;
            const totalPresent = presentMasks.length;
            
            // Фотограф: считаем, что у каждой маски есть фото (для демо)
            const hasPhotos = activatedCount >= 10;
            
            // Аудиолюбитель: для демо, считаем что после 10 активаций есть аудиогиды

            // Маски
            if (activatedCount >= 1 && !userAchievements.firstMask) { userAchievements.firstMask = true; changed = true; showAchievementToast('Первая маска'); }
            if (activatedCount >= 3 && !userAchievements.threeMasks) { userAchievements.threeMasks = true; changed = true; showAchievementToast('Знакомство с городом'); }
            if (activatedCount >= 5 && !userAchievements.fiveMasks) { userAchievements.fiveMasks = true; changed = true; showAchievementToast('Любознательный турист'); }
            if (activatedCount >= 12 && !userAchievements.dozenMasks) { userAchievements.dozenMasks = true; changed = true; showAchievementToast('Первая дюжина'); }
            if (activatedCount >= 50 && !userAchievements.fiftyMasks) { userAchievements.fiftyMasks = true; changed = true; showAchievementToast('Полтинник'); }
            if (activatedCount >= 100 && !userAchievements.hundredMasks) { userAchievements.hundredMasks = true; changed = true; showAchievementToast('Первая сотня', true); }
            if (activatedCount >= 250 && !userAchievements.twoFiftyMasks) { userAchievements.twoFiftyMasks = true; changed = true; showAchievementToast('Исследователь'); }
            if (activatedCount >= 500 && !userAchievements.fiveHundredMasks) { userAchievements.fiveHundredMasks = true; changed = true; showAchievementToast('Легенда', true); }
            
            // Маршруты

            if (completedRoutesCount >= 3 && !userAchievements.threeRoutes) { userAchievements.threeRoutes = true; changed = true; showAchievementToast('Любитель прогулок'); }
            if (completedRoutesCount >= 6 && !userAchievements.sixRoutes) { userAchievements.sixRoutes = true; changed = true; showAchievementToast('Опытный путешественник'); }
            if (completedRoutesCount >= 10 && !userAchievements.tenRoutes) { userAchievements.tenRoutes = true; changed = true; showAchievementToast('Мастер маршрутов', true); }
            if (completedRoutesCount >= 15 && !userAchievements.fifteenRoutes) { userAchievements.fifteenRoutes = true; changed = true; showAchievementToast('Покоритель города'); }
            if (completedRoutesCount >= 24 && !userAchievements.twentyFourRoutes) { userAchievements.twentyFourRoutes = true; changed = true; showAchievementToast('Король маршрутов', true); }
            
            // Фотограф (10 масок с фото)
            if (hasPhotos && !userAchievements.photographer) { 
                userAchievements.photographer = true; 
                changed = true; 
                showAchievementToast('Фотограф'); 
            }
            
            // Историк (все маски из категории "Прошлое")
            if (pastActivated === totalPast && totalPast > 0 && !userAchievements.historian) { 
                userAchievements.historian = true; 
                changed = true; 
                showAchievementToast('Историк'); 
            }
            
            // Современник (все маски из категории "Настоящее")
            if (presentActivated === totalPresent && totalPresent > 0 && !userAchievements.modernist) { 
                userAchievements.modernist = true; 
                changed = true; 
                showAchievementToast('Современник'); 
            }

            if (userAchievements.historian && userAchievements.modernist && !userAchievements.epochExplorer) {

                    const res = await fetch(`${API_BASE}/masks/activate`, {
                        method: 'POST',

                            userId: currentUserId,

} else if (result.error === 'already_activated') {

} else if (result.error === 'too_far') {

} else if (result.error === 'no_mask_nearby') {

    }
}

        let currentGalleryIndex = 0;
        let galleryImages = [];
        let isFullscreen = false;
        let fullscreenCurrentIndex = 0;
        
                function renderGallery(maskId, containerId) {
            const images = getMaskImages(maskId);
            galleryImages = images;
            
            let slidesHtml = '';
            let dotsHtml = '';
            
            images.forEach((img, index) => {
                slidesHtml += `<div class="gallery-slide" style="background-image: url('${img}');"></div>`;
                dotsHtml += `<div class="gallery-dot ${index === 0 ? 'active' : ''}" onclick="event.stopPropagation(); goToSlide(${index})"></div>`;
            });
            
            const galleryHtml = `
                <div class="gallery-container" id="gallery-container-${containerId}">
                    <div class="gallery-slides" id="gallery-slides-${containerId}" style="transform: translateX(0%);">
                        ${slidesHtml}
                    </div>
                    <div class="gallery-arrow gallery-arrow-left" onclick="event.stopPropagation(); prevSlide()">‹</div>
                    <div class="gallery-arrow gallery-arrow-right" onclick="event.stopPropagation(); nextSlide()">›</div>
                    <div class="gallery-nav" id="gallery-nav-${containerId}">
                        ${dotsHtml}
                    </div>
                </div>
            `;
            
            // Добавляем обработчики свайпа после рендера
            setTimeout(() => {
                const container = document.getElementById(`gallery-container-${containerId}`);
                if (container) {
                    addSwipeToGallery(container);
                }
            }, 50);
            
            return galleryHtml;
        }

                function addSwipeToGallery(container) {
            let touchStartX = 0;
            let touchEndX = 0;
            
            container.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            });
            
            container.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                const deltaX = touchEndX - touchStartX;
                
                if (Math.abs(deltaX) > 50) {
                    if (deltaX > 0) {
                        // Свайп вправо — предыдущее фото
                        prevSlide();
                    } else {
                        // Свайп влево — следующее фото
                        nextSlide();
                    }
                }
            });
        }
        
        function updateGalleryDots() {
            const dots = document.querySelectorAll('.gallery-dot');
            dots.forEach((dot, i) => {
                if (i === currentGalleryIndex) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }
        
        function prevSlide() {
            if (currentGalleryIndex > 0) {
                currentGalleryIndex--;
                const slides = document.querySelector('.gallery-slides');
                if (slides) {
                    slides.style.transform = `translateX(-${currentGalleryIndex * 100}%)`;
                }
                updateGalleryDots();
            }
        }
        
        function nextSlide() {
            if (currentGalleryIndex < galleryImages.length - 1) {
                currentGalleryIndex++;
                const slides = document.querySelector('.gallery-slides');
                if (slides) {
                    slides.style.transform = `translateX(-${currentGalleryIndex * 100}%)`;
                }
                updateGalleryDots();
            }
        }
        
        function goToSlide(index) {
            currentGalleryIndex = index;
            const slides = document.querySelector('.gallery-slides');
            if (slides) {
                slides.style.transform = `translateX(-${currentGalleryIndex * 100}%)`;
            }
            updateGalleryDots();
        }
        
                function openFullscreen(startIndex) {
            isFullscreen = true;
            fullscreenCurrentIndex = startIndex;
            
            let fullscreenSlides = '';
            galleryImages.forEach((img, index) => {
                fullscreenSlides += `<div class="fullscreen-slide" style="background-image: url('${img}');"></div>`;
            });
            
            let fullscreenDots = '';
            galleryImages.forEach((img, index) => {
                fullscreenDots += `<div class="fullscreen-dot ${index === startIndex ? 'active' : ''}" onclick="goToFullscreenSlide(${index})"></div>`;
            });
            
            const fullscreenHtml = `
                <div id="fullscreen-modal" class="fullscreen-modal">
                    <div class="fullscreen-close" onclick="closeFullscreen()">✕</div>
                    <div class="fullscreen-arrow fullscreen-arrow-left" onclick="prevFullscreenSlide()">‹</div>
                    <div class="fullscreen-arrow fullscreen-arrow-right" onclick="nextFullscreenSlide()">›</div>
                    <div class="fullscreen-slides" id="fullscreen-slides" style="transform: translateX(-${startIndex * 100}%);">

                        ${fullscreenDots}
                    </div>
                    <div class="fullscreen-counter">${startIndex + 1} / ${galleryImages.length}</div>

            document.body.insertAdjacentHTML('beforeend', fullscreenHtml);
            
            // Добавляем обработчики свайпа для полноэкранного режима
            setTimeout(() => {
                const modal = document.getElementById('fullscreen-modal');
                if (modal) {
                    let touchStartX = 0;
                    let touchEndX = 0;
                    
                    modal.addEventListener('touchstart', (e) => {
                        touchStartX = e.changedTouches[0].screenX;
                    });
                    
                    modal.addEventListener('touchend', (e) => {
                        touchEndX = e.changedTouches[0].screenX;
                        const deltaX = touchEndX - touchStartX;
                        
                        if (Math.abs(deltaX) > 50) {
                            if (deltaX > 0) {
                                prevFullscreenSlide();
                            } else {
                                nextFullscreenSlide();
                            }
                        }
                    });
                }
            }, 100);
        }
        
        function closeFullscreen() {
            const modal = document.getElementById('fullscreen-modal');

        function prevFullscreenSlide() {

                    slides.style.transform = `translateX(-${fullscreenCurrentIndex * 100}%)`;
                }
                updateFullscreenDots();
                updateFullscreenCounter();
            }
        }
        
        function nextFullscreenSlide() {
            if (fullscreenCurrentIndex < galleryImages.length - 1) {
                fullscreenCurrentIndex++;
                const slides = document.getElementById('fullscreen-slides');
                if (slides) {
                    slides.style.transform = `translateX(-${fullscreenCurrentIndex * 100}%)`;
                }
                updateFullscreenDots();
                updateFullscreenCounter();
            }
        }

            const dots = document.querySelectorAll('.fullscreen-dot');
            dots.forEach((dot, i) => {
                if (i === fullscreenCurrentIndex) {

                        // === ЗАПУСК СКАНЕРА QR-КОДОВ ===
        function startQRScan() {
            console.log('=== startQRScan вызван ===');
            console.log('window.Telegram:', window.Telegram);
            console.log('window.Telegram.WebApp:', window.Telegram?.WebApp);
            
            // Проверяем, что мы в Telegram
            if (!window.Telegram || !window.Telegram.WebApp) {
                showToast('Это приложение работает только в Telegram', 'error');
                console.error('Ошибка: не в Telegram WebApp');
                return;
            }
            
            const tg = window.Telegram.WebApp;
            console.log('Метод showScanQrPopup:', typeof tg.showScanQrPopup);
            console.log('Метод openScanQrPopup:', typeof tg.openScanQrPopup);
            
            // Пробуем разные методы сканера
            if (typeof tg.showScanQrPopup === 'function') {
                console.log('Используем showScanQrPopup');
                showToast('Наведите камеру на QR-код маски', 'info');
                
                tg.showScanQrPopup((scannedText) => {
                    console.log('Отсканировано:', scannedText);
                    if (!scannedText) {
                        showToast('Не удалось распознать код. Попробуйте ещё раз.', 'error');
                        return;
                    }
                    activateMaskByQR(scannedText);
                    return true;
                }, (error) => {
                    console.error('Ошибка showScanQrPopup:', error);
                    showToast('Ошибка запуска сканера. Попробуйте обновить Telegram.', 'error');
                });
                return;
            }
            
            // Альтернативный метод (старая версия Telegram)
            if (typeof tg.openScanQrPopup === 'function') {
                console.log('Используем openScanQrPopup');
                showToast('Наведите камеру на QR-код маски', 'info');
                
                tg.openScanQrPopup({
                    text: 'Наведите камеру на QR-код маски'
                }, (scannedText) => {
                    console.log('Отсканировано:', scannedText);
                    if (!scannedText) {
                        showToast('Не удалось распознать код. Попробуйте ещё раз.', 'error');
                        return;
                    }
                    activateMaskByQR(scannedText);
                });
                return;
            }
            
            // Если сканер не поддерживается
            console.error('Сканер не поддерживается в этой версии Telegram');
            showToast('Ваша версия Telegram не поддерживает сканер QR-кодов. Пожалуйста, обновите Telegram.', 'error');
        }

                // === АКТИВАЦИЯ МАСКИ ПО QR-КОДУ ===
        async function activateMaskByQR(maskIdFromQR) {
            showToast('Проверка маски...', 'info');

            try {
                const tg = window.Telegram?.WebApp;
                const user = tg?.initDataUnsafe?.user || {};

                const response = await fetch(`${API_BASE}/masks/activate-by-qr`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: currentUserId,
                        maskId: maskIdFromQR,
                        telegramData: {
                            chatId: user.id,
                            username: user.username,
                            firstName: user.first_name
                        }
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    showToast(result.message, 'success');
                    if (window.Telegram?.WebApp?.HapticFeedback) {
                        window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                    }
                    showActivatedMask(result.mask);
                    await loadInitialData();
                } else {
                    showToast(result.message, 'error');
                    if (window.Telegram?.WebApp?.HapticFeedback) {
                        window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
                    }
                }
            } catch (error) {
                console.error('Activation error:', error);
                showToast('Ошибка активации. Попробуйте снова.', 'error');
            }
        }

            const modalHtml = `
                <div id="map-modal" class="modal-overlay">
                    <div class="modal-container" style="max-width: 350px;">
                        <div class="modal-header">
                            <h2>Выберите карту</h2>
                            <button class="close-btn" onclick="closeMapChooser()">&times;</button>
                        </div>
                        <div class="modal-content" style="padding: 20px;">
                            <p style="color: #64748b; margin-bottom: 16px; text-align: center;">Выберите карту для навигации</p>
                            <button class="map-choice-btn" onclick="openYandexMaps()">
                                <i class="fab fa-yandex" style="color: #FC3F1D;"></i>
                                Яндекс.Карты
                            </button>
                            <button class="map-choice-btn" onclick="openGoogleMaps()" style="margin-top: 12px;">
                                <i class="fab fa-google" style="color: #4285F4;"></i>
                                Google Maps
                            </button>
                            <button class="map-choice-btn" onclick="open2GIS()" style="margin-top: 12px;">
                                <i class="fas fa-building" style="color: #00A0E3;"></i>
                                2GIS
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        // Закрыть окно выбора карты
        function closeMapChooser() {
            const modal = document.getElementById('map-modal');
            if (modal) modal.remove();
        }

        // Открыть Яндекс.Карты (центр Калининграда)
        function openYandexMaps() {
            const url = 'https://yandex.ru/maps/?ll=20.463649,54.679629&z=14';
            window.open(url, '_blank');
            closeMapChooser();
        }

                // Открыть Google Maps (центр Калининграда)
        function openGoogleMaps() {
            const url = 'https://www.google.com/maps?q=54.679629,20.463649';
            window.open(url, '_blank');
            closeMapChooser();
        }
        
        // Открыть 2GIS (Калининград)
        function open2GIS() {
            const url = 'https://2gis.ru/kaliningrad';
            window.open(url, '_blank');
            closeMapChooser();
        }
        
        // Экранирование HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // === ОБРАБОТЧИК СВАЙПОВ (смахивание вправо для возврата) ===
        
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;
        
        function handleTouchStart(event) {
            touchStartX = event.changedTouches[0].screenX;
            touchStartY = event.changedTouches[0].screenY;
        }
        
                function handleTouchEnd(event) {
            touchEndX = event.changedTouches[0].screenX;
            touchEndY = event.changedTouches[0].screenY;
            
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            // Если свайп вправо (deltaX > 50) и не слишком по диагонали
            if (deltaX > 50 && Math.abs(deltaY) < 100) {
                // Проверяем, не на главной ли мы странице
                if (currentPage !== 'main') {
                    // Сохраняем текущий HTML перед переходом
                    const currentHtml = document.getElementById('app').innerHTML;
                    const nextPage = 'main';
                    const nextHtml = (() => {
                        // Временный рендер главной страницы
                        const savedPage = currentPage;
                        currentPage = nextPage;
                        const html = renderMainMenu();
                        currentPage = savedPage;
                        return html;
                    })();
                    
                    // Создаём контейнер для анимации
                    const container = document.getElementById('app');
                    const oldDiv = document.createElement('div');
                    const newDiv = document.createElement('div');
                    
                    oldDiv.innerHTML = currentHtml;
                    newDiv.innerHTML = nextHtml;
                    
                    oldDiv.style.position = 'absolute';
                    oldDiv.style.top = '0';
                    oldDiv.style.left = '0';
                    oldDiv.style.width = '100%';
                    oldDiv.style.minHeight = '100vh';
                    oldDiv.style.transition = 'transform 0.3s ease';
                    oldDiv.style.transform = 'translateX(0)';
                    
                    newDiv.style.position = 'absolute';
                    newDiv.style.top = '0';
                    newDiv.style.left = '0';
                    newDiv.style.width = '100%';
                    newDiv.style.minHeight = '100vh';
                    newDiv.style.transition = 'transform 0.3s ease';
                    newDiv.style.transform = 'translateX(-100%)'; // Начинаем слева (за экраном)
                    
                    container.style.position = 'relative';
                    container.style.minHeight = '100vh';
                    container.innerHTML = '';
                    container.appendChild(newDiv);
                    container.appendChild(oldDiv);
                    
                    // Запускаем анимацию через 10мс для гарантии
                    setTimeout(() => {
                        oldDiv.style.transform = 'translateX(100%)';  // Старый уезжает вправо
                        newDiv.style.transform = 'translateX(0)';      // Новый приезжает слева
                    }, 10);
                    
                    // После анимации переходим на главную страницу
                    setTimeout(() => {
                        navigate('main');
                        container.style.position = '';
                        container.style.minHeight = '';
                    }, 300);
                }
            }
        }
        
        // Добавляем обработчики к контейнеру приложения
                function enableSwipeToGoBack() {
            const appDiv = document.getElementById('app');
            if (appDiv) {
                appDiv.removeEventListener('touchstart', handleTouchStart);
                appDiv.removeEventListener('touchend', handleTouchEnd);
                appDiv.addEventListener('touchstart', handleTouchStart);
                appDiv.addEventListener('touchend', handleTouchEnd);
            }
        }

                // === КНОПКА "НАВЕРХ" ===
        
        let scrollTimeout = null;
        
        function checkScroll() {
            const btn = document.getElementById('scrollTopBtn');
            if (!btn) return;
            
            const scrollY = window.scrollY || window.pageYOffset;
            
            // Показываем кнопку ТОЛЬКО если прокрутили больше 300px
            if (scrollY > 300) {
                btn.classList.add('show');
            } else {
                btn.classList.remove('show');
            }
        }
        
        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }
        
        // Добавляем обработчик прокрутки
        window.addEventListener('scroll', function() {
            if (scrollTimeout) clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(checkScroll, 50);
        });
        
        // Вызываем проверку при загрузке и при изменении размера
        window.addEventListener('load', checkScroll);
        window.addEventListener('resize', checkScroll);

        // Главная функция рендеринга
                function render() {
            const appDiv = document.getElementById('app');
            if (!appDiv) return;
            
            let content = '';
            
            switch (currentPage) {
                case 'main':
                    content = renderMainMenu();
                    break;
                case 'routes':
                    content = renderRoutesList();
                    break;
                case 'route-detail':
                    content = renderRouteDetail();
                    break;
                case 'catalog':
                    content = renderCatalog();
                    break;
                case 'activate':
                    content = renderActivate();
                    break;
                case 'privacy':
                    content = renderPrivacy();
                    break;
                case 'achievements':
                    content = renderAchievements();
                    break;
                case 'map':
                    content = renderMap();
                    break;
                default:
                    content = renderMainMenu();
            }
            
            appDiv.innerHTML = content;
            
            // Сбрасываем проверку прокрутки при смене страницы
            setTimeout(() => {
                const btn = document.getElementById('scrollTopBtn');
                if (btn) {
                    btn.classList.remove('show');
                }
                // Принудительно скроллим наверх при смене страницы
                window.scrollTo(0, 0);
                checkScroll();
            }, 100);
            
            // Включаем свайп для возврата (кроме главной)
            if (currentPage !== 'main') {
                enableSwipeToGoBack();
            }
        }

                // === ФУНКЦИИ ДЛЯ КАРУСЕЛИ В КАРТОЧКЕ МАСКИ ===
        
        let currentExtendedIndex = 0;
        let extendedImagesCount = 5;
        
        function updateExtendedDots() {
            const dots = document.querySelectorAll('#gallery-nav-extended .gallery-dot');
            dots.forEach((dot, i) => {
                if (i === currentExtendedIndex) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }
        
        function prevSlideExtended() {
            if (currentExtendedIndex > 0) {
                currentExtendedIndex--;
                const slides = document.getElementById('gallery-slides-extended');
                if (slides) {
                    slides.style.transform = `translateX(-${currentExtendedIndex * 100}%)`;
                }
                updateExtendedDots();
            }
        }
        
        function nextSlideExtended() {
            if (currentExtendedIndex < extendedImagesCount - 1) {
                currentExtendedIndex++;
                const slides = document.getElementById('gallery-slides-extended');
                if (slides) {
                    slides.style.transform = `translateX(-${currentExtendedIndex * 100}%)`;
                }
                updateExtendedDots();
            }
        }
        
        function goToSlideExtended(index) {
            currentExtendedIndex = index;
            const slides = document.getElementById('gallery-slides-extended');
            if (slides) {
                slides.style.transform = `translateX(-${currentExtendedIndex * 100}%)`;
            }
            updateExtendedDots();
        }
        
        // Полноэкранный режим для карусели
        function openFullscreenExtended(startIndex) {
            const maskId = window.currentFullscreenMaskId || 'mask_1';
            currentExtendedIndex = startIndex;
            
            let fullscreenSlides = '';
            for (let i = 1; i <= 5; i++) {
                fullscreenSlides += `<div class="fullscreen-slide" style="background-image: url('/images/${maskId}.jpg');"></div>`;
            }
            
            let fullscreenDots = '';
            for (let i = 1; i <= 5; i++) {
                fullscreenDots += `<div class="fullscreen-dot ${i === startIndex + 1 ? 'active' : ''}" onclick="goToFullscreenSlideExtended(${i - 1})"></div>`;
            }
            
            const fullscreenHtml = `
                <div id="fullscreen-modal-extended" class="fullscreen-modal">
                    <div class="fullscreen-close" onclick="closeFullscreenExtended()">✕</div>
                    <div class="fullscreen-arrow fullscreen-arrow-left" onclick="prevFullscreenSlideExtended()">‹</div>
                    <div class="fullscreen-arrow fullscreen-arrow-right" onclick="nextFullscreenSlideExtended()">›</div>
                    <div class="fullscreen-slides" id="fullscreen-slides-extended" style="transform: translateX(-${startIndex * 100}%);">
                        ${fullscreenSlides}
                    </div>
                    <div class="fullscreen-nav" id="fullscreen-nav-extended">
                        ${fullscreenDots}
                    </div>
                    <div class="fullscreen-counter" id="fullscreen-counter-extended">${startIndex + 1} / 5</div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', fullscreenHtml);
            
            // Добавляем свайп для полноэкранного режима
            setTimeout(() => {
                const modal = document.getElementById('fullscreen-modal-extended');
                if (modal) {
                    let touchStartX = 0;
                    let touchEndX = 0;
                    
                    modal.addEventListener('touchstart', (e) => {
                        touchStartX = e.changedTouches[0].screenX;
                    });
                    
                    modal.addEventListener('touchend', (e) => {
                        touchEndX = e.changedTouches[0].screenX;
                        const deltaX = touchEndX - touchStartX;
                        
                        if (Math.abs(deltaX) > 50) {
                            if (deltaX > 0) {
                                prevFullscreenSlideExtended();
                            } else {
                                nextFullscreenSlideExtended();
                            }
                        }
                    });
                }
            }, 100);
        }
        
        function closeFullscreenExtended() {
            const modal = document.getElementById('fullscreen-modal-extended');
            if (modal) modal.remove();
        }
        
        function prevFullscreenSlideExtended() {
            if (currentExtendedIndex > 0) {
                currentExtendedIndex--;
                const slides = document.getElementById('fullscreen-slides-extended');
                if (slides) {
                    slides.style.transform = `translateX(-${currentExtendedIndex * 100}%)`;
                }
                updateFullscreenDotsExtended(currentExtendedIndex);
                updateFullscreenCounterExtended(currentExtendedIndex);
            }
        }
        
        function nextFullscreenSlideExtended() {
            if (currentExtendedIndex < extendedImagesCount - 1) {
                currentExtendedIndex++;
                const slides = document.getElementById('fullscreen-slides-extended');
                if (slides) {
                    slides.style.transform = `translateX(-${currentExtendedIndex * 100}%)`;
                }
                updateFullscreenDotsExtended(currentExtendedIndex);
                updateFullscreenCounterExtended(currentExtendedIndex);
            }
        }
        
        function goToFullscreenSlideExtended(index) {
            currentExtendedIndex = index;
            const slides = document.getElementById('fullscreen-slides-extended');
            if (slides) {
                slides.style.transform = `translateX(-${currentExtendedIndex * 100}%)`;
            }
            updateFullscreenDotsExtended(currentExtendedIndex);
            updateFullscreenCounterExtended(currentExtendedIndex);
        }
        
        function updateFullscreenDotsExtended(currentIndex) {
            const dots = document.querySelectorAll('#fullscreen-nav-extended .fullscreen-dot');
            dots.forEach((dot, i) => {
                if (i === currentIndex) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }
        
        function updateFullscreenCounterExtended(currentIndex) {
            const counter = document.getElementById('fullscreen-counter-extended');
            if (counter) {
                counter.textContent = `${currentIndex + 1} / ${extendedImagesCount}`;
            }
        }
        
        // Запускаем приложение
        initTelegram();

        window.navigate = navigate;
        window.activateMask = activateMask;

        window.showExtendedMaskInfo = showExtendedMaskInfo;

        window.openRouteOnMap = openRouteOnMap;
window.showMapChooser = showMapChooser;
window.closeMapChooser = closeMapChooser;
window.openYandexMaps = openYandexMaps;
        window.showPrivacyPopup = showPrivacyPopup;
        window.closePrivacyPopup = closePrivacyPopup;
                window.scrollToTop = scrollToTop;
                        window.showRouteMapChooser = showRouteMapChooser;
        window.closeRouteMapChooser = closeRouteMapChooser;
        window.openYandexMapsForRoute = openYandexMapsForRoute;
        window.openGoogleMapsForRoute = openGoogleMapsForRoute;

        window.open2GIS = open2GIS;

        window.closeMaskMapChooser = closeMaskMapChooser;
        window.openYandexMapsForMask = openYandexMapsForMask;
        window.openGoogleMapsForMask = openGoogleMapsForMask;
        window.open2GISForMask = open2GISForMask;
                window.prevSlide = prevSlide;
        window.nextSlide = nextSlide;
        window.goToSlide = goToSlide;
        window.openFullscreen = openFullscreen;
        window.closeFullscreen = closeFullscreen;
        window.prevFullscreenSlide = prevFullscreenSlide;
        window.nextFullscreenSlide = nextFullscreenSlide;
        window.goToFullscreenSlide = goToFullscreenSlide;
                window.prevSlideExtended = prevSlideExtended;
        window.nextSlideExtended = nextSlideExtended;
        window.openFullscreenExtended = openFullscreenExtended;
                window.prevSlideExtended = prevSlideExtended;
        window.nextSlideExtended = nextSlideExtended;
        window.goToSlideExtended = goToSlideExtended;
        window.openFullscreenExtended = openFullscreenExtended;
        window.closeFullscreenExtended = closeFullscreenExtended;
        window.prevFullscreenSlideExtended = prevFullscreenSlideExtended;
        window.nextFullscreenSlideExtended = nextFullscreenSlideExtended;
        window.goToFullscreenSlideExtended = goToFullscreenSlideExtended;
                window.switchTab = switchTab;
        window.prevSlideExtendedTab = prevSlideExtendedTab;
        window.nextSlideExtendedTab = nextSlideExtendedTab;
        window.goToSlideExtendedTab = goToSlideExtendedTab;
        window.openFullscreenExtendedTab = openFullscreenExtendedTab;
        window.closeFullscreenExtendedTab = closeFullscreenExtendedTab;
        window.prevFullscreenSlideExtendedTab = prevFullscreenSlideExtendedTab;
        window.nextFullscreenSlideExtendedTab = nextFullscreenSlideExtendedTab;
        window.goToFullscreenSlideExtendedTab = goToFullscreenSlideExtendedTab;
                window.openFullscreenForTab = openFullscreenForTab;
        window.closeFullscreenExtendedTab = closeFullscreenExtendedTab;
        window.prevFullscreenSlideExtendedTab = prevFullscreenSlideExtendedTab;
        window.nextFullscreenSlideExtendedTab = nextFullscreenSlideExtendedTab;
        window.goToFullscreenSlideExtendedTab = goToFullscreenSlideExtendedTab;
                window.closeSupportModal = closeSupportModal;
        window.contactAdmin = contactAdmin;
                window.showAchievementInfo = showAchievementInfo;
        window.closeAchievementModal = closeAchievementModal;
        window.contactAdminForAchievement = contactAdminForAchievement;
                window.cycleAchievementFilter = cycleAchievementFilter;
                        window.prevSlideExtended = prevSlideExtended;
        window.nextSlideExtended = nextSlideExtended;
        window.goToSlideExtended = goToSlideExtended;
        window.openFullscreenExtended = openFullscreenExtended;
        window.closeFullscreenExtended = closeFullscreenExtended;
        window.prevFullscreenSlideExtended = prevFullscreenSlideExtended;
        window.nextFullscreenSlideExtended = nextFullscreenSlideExtended;
        window.goToFullscreenSlideExtended = goToFullscreenSlideExtended;
                window.startQRScan = startQRScan;
        window.activateMaskByQR = activateMaskByQR;
    </script>
