<body>
    <div id="app">
        <div class="spinner"></div>
    </div>
    
    <!-- Кнопка "Наверх" -->
    <button id="scrollTopBtn" class="scroll-top-btn" onclick="scrollToTop()">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script>
        // Конфигурация API
        const API_BASE = window.location.origin + '/api';
        
        // Глобальное состояние
        let currentPage = 'main';
        let currentUserId = null;
        let currentRouteId = null;
        let appState = {
            masks: [],
            routes: [],
            progress: { activatedMasks: 0, totalMasks: 0, completedRoutes: 0, totalRoutes: 0 },
            activations: []
        };
        
        let toastTimeout = null;
        
        function showToast(message, type = 'success') {
            const existingToast = document.querySelector('.toast-notification');
            if (existingToast) existingToast.remove();
            if (toastTimeout) clearTimeout(toastTimeout);
            
            const toast = document.createElement('div');
            toast.className = `toast-notification toast-${type}`;
            toast.innerHTML = `<span>${message}</span>`;
            document.body.appendChild(toast);
            
            toastTimeout = setTimeout(() => {
                if (toast && toast.remove) toast.remove();
            }, 3000);
        }
        
        // Получаем userId из Telegram
        function initTelegram() {
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                if (typeof tg.disableVerticalSwipes === 'function') {
                    tg.disableVerticalSwipes();
                }
                
                const user = tg.initDataUnsafe?.user;
                if (user && user.id) {
                    currentUserId = user.id.toString();
                }
            }
            
            if (!currentUserId) {
                currentUserId = 'test_user_' + Date.now();
            }
            
            console.log('User ID:', currentUserId);
            loadInitialData();
        }
        
        // Загрузка начальных данных
        async function loadInitialData() {
            await Promise.all([
                loadProgress(),
                loadMasks(),
                loadRoutes(),
                loadActivations()
            ]);
            render();
        }
        
        async function loadProgress() {
            try {
                const res = await fetch(`${API_BASE}/user/progress?userId=${currentUserId}`);
                const data = await res.json();

        // === АКТИВАЦИЯ ПО QR-КОДУ ===
        async function activateMaskByQR(maskId) {
            console.log('=== АКТИВАЦИЯ ПО QR ===');
            console.log('ID маски из QR:', maskId);
            
            if (!maskId) {
                showToast('Не удалось распознать код маски', 'error');
                return;
            }
            
            showToast('Проверка маски...', 'info');
            
            try {
                const tg = window.Telegram?.WebApp;
                const user = tg?.initDataUnsafe?.user || {};
                
                const response = await fetch(`${API_BASE}/masks/activate-by-qr`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: currentUserId,
                        maskId: maskId,
                        telegramData: {
                            chatId: user.id,
                            username: user.username,
                            firstName: user.first_name
                        }
                    })
                });
                
                const result = await response.json();
                console.log('Результат активации:', result);
                
                if (result.success) {
                    showToast(result.message, 'success');
                    if (window.Telegram?.WebApp?.HapticFeedback) {
                        window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                    }
                    showActivatedMask(result.mask);
                    await loadInitialData();
                    navigate('main');
                } else {
                    showToast(result.message, 'error');
                    if (window.Telegram?.WebApp?.HapticFeedback) {
                        window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
                    }
                }
            } catch (error) {
                console.error('Activation error:', error);
                showToast('Ошибка активации. Попробуйте снова.', 'error');
            }
        }
        
                // === ЗАПУСК СКАНЕРА QR-КОДОВ ===
        function startQRScan() {
            console.log('startQRScan вызван');
            
            if (!window.Telegram?.WebApp) {
                showToast('Это приложение работает только в Telegram', 'error');
                return;
            }
            
            const tg = window.Telegram.WebApp;
            
            // Проверяем поддержку сканера
            if (!tg.showScanQrPopup && !tg.openScanQrPopup) {
                showToast('Ваша версия Telegram не поддерживает сканер QR-кодов', 'error');
                console.log('Сканер не поддерживается');
                return;
            }
            
            showToast('Наведите камеру на QR-код', 'info');
            
            // Используем современный метод showScanQrPopup
            if (tg.showScanQrPopup) {
                tg.showScanQrPopup((scannedText) => {
                    console.log('Отсканировано (showScanQrPopup):', scannedText);
                    if (!scannedText) {
                        showToast('Не удалось распознать код', 'error');
                        return true;
                    }
                    processScannedQR(scannedText);
                    return true;
                }, (error) => {
                    console.error('Ошибка сканера:', error);
                    showToast('Ошибка запуска сканера', 'error');
                });
            }
            // fallback на старый метод
            else if (tg.openScanQrPopup) {
                tg.openScanQrPopup({
                    text: 'Наведите камеру на QR-код маски'
                }, (scannedText) => {
                    console.log('Отсканировано (openScanQrPopup):', scannedText);
                    if (!scannedText) {
                        showToast('Не удалось распознать код', 'error');
                        return;
                    }
                    processScannedQR(scannedText);
                });
            }
        }
        
        function processScannedQR(scannedText) {
            console.log('processScannedQR:', scannedText);
            
            let maskId = null;
            
            // Парсим ID маски из ссылки вида https://domain.com/m/17
            if (scannedText.includes('/m/')) {
                try {
                    const url = new URL(scannedText);
                    const pathParts = url.pathname.split('/');
                    maskId = pathParts[pathParts.length - 1];
                } catch (e) {
                    maskId = scannedText;
                }
            } else {
                maskId = scannedText;
            }
            
            console.log('ID маски после парсинга:', maskId);
            
            if (maskId) {
                activateMaskByQR(maskId);
            } else {
                showToast('Не удалось определить маску', 'error');
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

            if (activatedCount >= 5 && !userAchievements.fiveMasks) { userAchievements.fiveMasks = true; changed = true; showAchievementToast('Любознательный турист'); }
            if (activatedCount >= 12 && !userAchievements.dozenMasks) { userAchievements.dozenMasks = true; changed = true; showAchievementToast('Первая дюжина'); }
            if (activatedCount >= 50 && !userAchievements.fiftyMasks) { userAchievements.fiftyMasks = true; changed = true; showAchievementToast('Полтинник'); }
            if (activatedCount >= 100 && !userAchievements.hundredMasks) { userAchievements.hundredMasks = true; changed = true; showAchievementToast('Первая сотня', true); }
            if (activatedCount >= 250 && !userAchievements.twoFiftyMasks) { userAchievements.twoFiftyMasks = true; changed = true; showAchievementToast('Исследователь'); }
            if (activatedCount >= 500 && !userAchievements.fiveHundredMasks) { userAchievements.fiveHundredMasks = true; changed = true; showAchievementToast('Легенда', true); }
            if (completedRoutesCount >= 1 && !userAchievements.firstRoute) { userAchievements.firstRoute = true; changed = true; showAchievementToast('Первый маршрут'); }
            if (completedRoutesCount >= 3 && !userAchievements.threeRoutes) { userAchievements.threeRoutes = true; changed = true; showAchievementToast('Любитель прогулок'); }
            if (completedRoutesCount >= 6 && !userAchievements.sixRoutes) { userAchievements.sixRoutes = true; changed = true; showAchievementToast('Опытный путешественник'); }
            if (completedRoutesCount >= 10 && !userAchievements.tenRoutes) { userAchievements.tenRoutes = true; changed = true; showAchievementToast('Мастер маршрутов', true); }
            if (completedRoutesCount >= 15 && !userAchievements.fifteenRoutes) { userAchievements.fifteenRoutes = true; changed = true; showAchievementToast('Покоритель города'); }
            if (completedRoutesCount >= 24 && !userAchievements.twentyFourRoutes) { userAchievements.twentyFourRoutes = true; changed = true; showAchievementToast('Король маршрутов', true); }
            
            if (changed) {
                localStorage.setItem(`achievements_${currentUserId}`, JSON.stringify(userAchievements));
            }
        }
        
        function showAchievementToast(achievementName, isSpecial = false) {
            if (currentPage !== 'main') {
                localStorage.setItem(`pending_achievement_${currentUserId}`, achievementName);
                if (isSpecial) {
                    localStorage.setItem(`pending_achievement_special_${currentUserId}`, 'true');
                }
                return;
            }
            
            showToast('Новое достижение', 'success');
            if (isSpecial) {
                setTimeout(() => {
                    showToast('Нажми на достижение, чтобы похвастаться!', 'info');
                }, 3000);
            }
        }
        
        function loadUserAchievements() {
            const saved = localStorage.getItem(`achievements_${currentUserId}`);
            if (saved) {
                userAchievements = JSON.parse(saved);
            }
        }
        
        function showAchievementInfo(achievementId) {
            const ach = achievementsList.find(a => a.id === achievementId);
            if (!ach) return;
            
            const isUnlocked = userAchievements[ach.id];
            const statusText = isUnlocked ? '✅ Получено' : '⚪ Не получено';
            const statusColor = isUnlocked ? '#10B981' : '#64748b';
            
            let rewardButton = '';
            if (isUnlocked && ach.special) {
                rewardButton = `
                    <button class="achievement-reward-btn" onclick="contactAdminForAchievement('${ach.name}')">
                        <i class="fas fa-share-alt"></i> ${ach.reward}
                    </button>
                `;
            }
            
            const modalHtml = `
                <div id="achievement-modal" class="modal-overlay" onclick="if(event.target === this) closeAchievementModal()">
                    <div class="modal-container" style="max-width: 350px;">
                        <div class="modal-header">
                            <h2><i class="fas ${ach.icon}" style="margin-right: 8px;"></i> ${ach.name}</h2>
                            <button class="close-btn" onclick="closeAchievementModal()">&times;</button>
                        </div>
                        <div class="modal-content" style="padding: 20px; text-align: center;">
                            <div style="font-size: 48px; margin-bottom: 16px;">
                                <i class="fas ${ach.icon}" style="color: ${isUnlocked ? '#F59E0B' : '#3d3d5c'}"></i>
                            </div>
                            <p style="color: #94a3b8; margin-bottom: 8px;">${ach.description}</p>
                            <p style="color: #64748b; font-size: 11px; margin-bottom: 16px;">${ach.requirement}</p>
                            <p style="color: ${statusColor}; font-weight: 600; margin-bottom: 16px;">${statusText}</p>
                            ${rewardButton}
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }
        
        function closeAchievementModal() {
            const modal = document.getElementById('achievement-modal');
            if (modal) modal.remove();
        }
        
        function contactAdminForAchievement(achievementName) {
            const message = `Я получил достижение "${achievementName}" в квесте НЕГОДЯЙ! Хочу похвастаться!`;
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.openTelegramLink(`https://t.me/negodiai?text=${encodeURIComponent(message)}`);
            } else {
                alert(`Поддержка: @negodiai в Telegram`);
            }
            closeAchievementModal();
        }
        
        function checkPendingAchievements() {
            const pending = localStorage.getItem(`pending_achievement_${currentUserId}`);
            if (pending) {
                setTimeout(() => {
                    showToast('Новое достижение', 'success');
                    const isSpecial = localStorage.getItem(`pending_achievement_special_${currentUserId}`);
                    if (isSpecial === 'true') {
                        setTimeout(() => {
                            showToast('Нажми на достижение, чтобы похвастаться!', 'info');
                        }, 3000);
                    }
                }, 1000);
                localStorage.removeItem(`pending_achievement_${currentUserId}`);
                localStorage.removeItem(`pending_achievement_special_${currentUserId}`);
            }
        }
        
                let touchStartX = 0;
        let touchEndX = 0;
        let touchStartY = 0;
        let touchEndY = 0;
        
        function handleTouchStart(event) {
            touchStartX = event.changedTouches[0].screenX;
            touchStartY = event.changedTouches[0].screenY;
        }
        
        function handleTouchEnd(event) {
            touchEndX = event.changedTouches[0].screenX;
            touchEndY = event.changedTouches[0].screenY;
            
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            // Свайп вправо (deltaX > 50) и не слишком по диагонали
            if (deltaX > 50 && Math.abs(deltaY) < 100) {
                if (currentPage !== 'main') {
                    navigate('main');
                }
            }
        }
        
        function enableSwipeToGoBack() {
            const appDiv = document.getElementById('app');
            if (appDiv) {
                appDiv.removeEventListener('touchstart', handleTouchStart);
                appDiv.removeEventListener('touchend', handleTouchEnd);
                appDiv.addEventListener('touchstart', handleTouchStart);
                appDiv.addEventListener('touchend', handleTouchEnd);
            }
        }
        
        // === ПРОКРУТКА ===
        window.addEventListener('scroll', function() {
            if (scrollTimeout) clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(checkScroll, 50);
        });
        
        window.addEventListener('load', checkScroll);
        window.addEventListener('resize', checkScroll);
        
        // === РЕНДЕР ===
        function render() {
            const appDiv = document.getElementById('app');
            if (!appDiv) return;
            
            let content = '';
            
            switch (currentPage) {
                case 'main':
                    content = renderMainMenu();
                    break;
                case 'routes':
                    content = renderRoutesList();
                    break;
                case 'route-detail':
                    content = renderRouteDetail();
                    break;
                case 'catalog':
                    content = renderCatalog();
                    break;
                case 'activate':
                    content = renderActivate();
                    break;
                case 'privacy':
                    content = renderPrivacy();
                    break;
                case 'achievements':
                    content = renderAchievements();
                    break;
                case 'map':
                    content = renderMap();
                    break;
                default:
                    content = renderMainMenu();
            }
            
            appDiv.innerHTML = content;
            
            if (currentPage !== 'main') {
                enableSwipeToGoBack();
            }
            
            setTimeout(() => {
                const btn = document.getElementById('scrollTopBtn');
                if (btn) {
                    btn.classList.remove('show');
                }
                window.scrollTo(0, 0);
                checkScroll();
            }, 100);
        }
        
        // Запускаем приложение
        initTelegram();
        
        // Делаем функции глобальными
        window.navigate = navigate;
        window.startQRScan = startQRScan;
        window.resetActivation = resetActivation;
        window.openLocation = openLocation;
        window.buyMask = buyMask;
        window.openSupport = openSupport;
        window.showSimpleMaskInfo = showSimpleMaskInfo;
        window.showExtendedMaskInfo = showExtendedMaskInfo;
        window.closeModal = closeModal;
        window.openRouteOnMap = openRouteOnMap;
        window.showMapChooser = showMapChooser;
        window.closeMapChooser = closeMapChooser;
        window.openYandexMaps = openYandexMaps;
        window.openGoogleMaps = openGoogleMaps;
        window.open2GIS = open2GIS;
        window.showRouteMapChooser = showRouteMapChooser;
        window.closeRouteMapChooser = closeRouteMapChooser;
        window.openYandexMapsForRoute = openYandexMapsForRoute;
        window.openGoogleMapsForRoute = openGoogleMapsForRoute;
        window.open2GISForRoute = open2GISForRoute;
        window.cycleFilter = cycleFilter;
        window.cycleMaskFilter = cycleMaskFilter;
        window.showMaskMapChooser = showMaskMapChooser;
        window.closeMaskMapChooser = closeMaskMapChooser;
        window.scrollToTop = scrollToTop;
        window.closeSupportModal = closeSupportModal;
        window.contactAdmin = contactAdmin;
        window.showPrivacyPopup = showPrivacyPopup;
        window.closePrivacyPopup = closePrivacyPopup;
        window.showAchievementInfo = showAchievementInfo;
        window.closeAchievementModal = closeAchievementModal;
        window.contactAdminForAchievement = contactAdminForAchievement;
        window.openCustomYandexMaps = openCustomYandexMaps;
        window.openCustomGoogleMaps = openCustomGoogleMaps;
        window.openCustom2GIS = openCustom2GIS;
        window.activateMaskByQR = activateMaskByQR;
    </script>
</body>
</html>
