<body>
        <div id="app">
        <div class="spinner"></div>
    </div>
    
    <!-- Кнопка "Наверх" -->
    <button id="scrollTopBtn" class="scroll-top-btn" onclick="scrollToTop()">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script>
        // Конфигурация API
        const API_BASE = window.location.origin + '/api';
        
        // Глобальное состояние
        let currentPage = 'main';
        let currentUserId = null;
        let currentRouteId = null;
        let appState = {
            masks: [],
            routes: [],
            progress: { activatedMasks: 0, totalMasks: 0, completedRoutes: 0, totalRoutes: 0 },
            activations: []
        };
        
        // Функция для показа всплывающего уведомления
        let toastTimeout = null;
        
        function showToast(message, type = 'success') {
            // Удаляем предыдущее уведомление
            const existingToast = document.querySelector('.toast-notification');
            if (existingToast) {
                existingToast.remove();
            }
            if (toastTimeout) {
                clearTimeout(toastTimeout);
            }
            
            // Создаём новое уведомление
            const toast = document.createElement('div');
            toast.className = `toast-notification toast-${type}`;
            
            // Выбираем иконку в зависимости от типа
            let icon = '';
            if (type === 'success') {
                icon = '<i class="fas fa-check-circle" style="font-size: 18px;"></i>';
            } else if (type === 'error') {
                icon = '<i class="fas fa-exclamation-circle" style="font-size: 18px;"></i>';
            } else if (type === 'warning') {
                icon = '<i class="fas fa-exclamation-triangle" style="font-size: 18px;"></i>';
            } else {
                icon = '<i class="fas fa-info-circle" style="font-size: 18px;"></i>';
            }
            
            toast.innerHTML = `${icon} <span>${message}</span>`;
            document.body.appendChild(toast);
            
            // Автоматически удаляем через 3 секунды
            toastTimeout = setTimeout(() => {
                if (toast && toast.remove) {
                    toast.remove();
                }
            }, 3000);
        }
        
        // Получаем userId из Telegram
        function initTelegram() {
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                const user = tg.initDataUnsafe?.user;
                if (user && user.id) {
                    currentUserId = user.id.toString();
                }
            }
            
            if (!currentUserId) {
                currentUserId = 'test_user_' + Date.now();
            }
            
            console.log('User ID:', currentUserId);
            loadInitialData();
        }
        
        // Загрузка начальных данных
        async function loadInitialData() {
            await Promise.all([
                loadProgress(),
                loadMasks(),
                loadRoutes(),
                loadActivations()
            ]);
            render();
        }
        
        async function loadProgress() {
            try {
                const res = await fetch(`${API_BASE}/user/progress?userId=${currentUserId}`);
                const data = await res.json();
                appState.progress = data;
            } catch (e) {
                console.error('Failed to load progress:', e);
            }
        }
        
        async function loadMasks() {
            try {
                const res = await fetch(`${API_BASE}/masks/list`);
                const data = await res.json();
                appState.masks = data;
            } catch (e) {
                console.error('Failed to load masks:', e);
            }
        }
        
        async function loadRoutes() {
            try {
                const res = await fetch(`${API_BASE}/routes/list?userId=${currentUserId}`);
                const data = await res.json();
                appState.routes = data;
            } catch (e) {
                console.error('Failed to load routes:', e);
            }
        }
        
        async function loadActivations() {
            try {
                const res = await fetch(`${API_BASE}/user/activations?userId=${currentUserId}`);
                const data = await res.json();
                appState.activations = data;
            } catch (e) {
                console.error('Failed to load activations:', e);
            }
        }
        
        // Навигация
        function navigate(page, params = {}) {
            currentPage = page;
            if (params.routeId) currentRouteId = params.routeId;
            render();
        }
        
        // Активация маски с новыми уведомлениями
        async function activateMask() {
            if (!navigator.geolocation) {
                showToast('Геолокация не поддерживается', 'error');
                return;
            }
            
            showToast('Определение местоположения...', 'info');
            
            navigator.geolocation.getCurrentPosition(async (position) => {
                try {
                    const tg = window.Telegram?.WebApp;
                    const user = tg?.initDataUnsafe?.user || {};
                    
                    const res = await fetch(`${API_BASE}/masks/activate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            userId: currentUserId,
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            telegramData: {
                                chatId: user.id,
                                username: user.username,
                                firstName: user.first_name
                            }
                        })
                    });
                    
                    const result = await res.json();
                    
                    if (result.success) {
    // Успешная активация
    showToast(`Вы успешно активировали маску!`, 'success');
    if (window.Telegram?.WebApp?.HapticFeedback) {
        window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
    }
    // Показываем контент маски
    showActivatedMask(result.mask);
    await loadInitialData();
} else if (result.error === 'already_activated') {
    // Уже активирована
    showToast(`Вы уже активировали эту маску! Ищите следующую.`, 'warning');
    if (window.Telegram?.WebApp?.HapticFeedback) {
        window.Telegram.WebApp.HapticFeedback.notificationOccurred('warning');
    }
} else if (result.error === 'too_far') {
    // Слишком далеко
    showToast(`Вы слишком далеко (${result.distance}м). Подойдите ближе (в радиусе 30м)`, 'error');
    if (window.Telegram?.WebApp?.HapticFeedback) {
        window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
    }
} else if (result.error === 'no_mask_nearby') {
    // Нет маски рядом
    showToast(`Рядом нет масок. Подойдите к любой маске в радиусе 30м`, 'error');
    if (window.Telegram?.WebApp?.HapticFeedback) {
        window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
    }
} else {
    showToast(result.message || 'Ошибка активации', 'error');
    if (window.Telegram?.WebApp?.HapticFeedback) {
        window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
    }
}
                } catch (e) {
                    console.error('Activation error:', e);
                    showToast('Ошибка активации. Попробуйте еще раз.', 'error');
                }
            }, (error) => {

            const historyText = `Кафедральный собор в Калининграде — выдающийся памятник северной готической архитектуры XIV в., ставший настоящим культурным и философским символом города. Длина здания 88,5 м, высота его самой высокой остроконечной башни — около 51 м: собор невелик. Это — один из немногих сохранившихся образцов кирпичной готики в России. Его строительство началось почти через 80 лет после основания Кёнигсберга рыцарями Тевтонского ордена. Церковь возводили из местного материала — обожженного кирпича, что определило теплый, насыщенно-красноватый цвет здания.

Бывший храм отличается классическими для Средневековья архитектурными решениями. Его изюминка — ассиметричный, строгий и выразительный двухбашенный фасад. По горизонтали он визуально разделен штукатурными поясами, а по вертикали — арочными стрельчатыми проемами разных размеров.

Северная башня завершается треугольным фронтоном, а круглую южную венчает шпиль, на котором установлен флюгер. Фасад ее украшен часами-курантами — точной копией тех, что были установлены тут в XVII в, но до наших дней не дожили. Промежуток между башнями заполняет ажурный щипец. Внутри собора — восстановленные элементы сводов с росписями, витражи и трибуны для органа. Парадный вход украшает готическая арка.

Побывать в соборе будет интересно не только тем, кого завораживает Средневековье и интересует немецкий период истории города. Сегодня этот памятник архитектуры — настоящее арт-пространство. В его стенах открыты музеи с оригинальными экспозициями, любителей музыки ждет большой концертный зал с главным действующим органным комплексом страны. Здесь проводятся выставки и конференции, фестивали и экскурсии.

Одновременно это место памяти Иммануила Канта — его могила расположена у северо-восточной стены собора. Великому ученому и уроженцу города посвящена экспозиция одного из музеев, а потому здесь непременно стоит побывать всем почитателям его философии. Есть в соборе и часовни для верующих — евангелистская и православная.`;

        // Закрыть окно выбора карты
        function closeMapChooser() {
            const modal = document.getElementById('map-modal');
            if (modal) modal.remove();
        }

        // Открыть Яндекс.Карты (центр Калининграда)
        function openYandexMaps() {
            const url = 'https://yandex.ru/maps/?ll=20.463649,54.679629&z=14';
            window.open(url, '_blank');
            closeMapChooser();
        }
        
        // Экранирование HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // === ОБРАБОТЧИК СВАЙПОВ (смахивание вправо для возврата) ===
        
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;
        
        function handleTouchStart(event) {
            touchStartX = event.changedTouches[0].screenX;
            touchStartY = event.changedTouches[0].screenY;
        }
        
                function handleTouchEnd(event) {
            touchEndX = event.changedTouches[0].screenX;
            touchEndY = event.changedTouches[0].screenY;
            
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            // Если свайп вправо (deltaX > 50) и не слишком по диагонали
            if (deltaX > 50 && Math.abs(deltaY) < 100) {
                // Проверяем, не на главной ли мы странице
                if (currentPage !== 'main') {
                    // Сохраняем текущий HTML перед переходом
                    const currentHtml = document.getElementById('app').innerHTML;
                    const nextPage = 'main';
                    const nextHtml = (() => {
                        // Временный рендер главной страницы
                        const savedPage = currentPage;
                        currentPage = nextPage;
                        const html = renderMainMenu();
                        currentPage = savedPage;
                        return html;
                    })();
                    
                    // Создаём контейнер для анимации
                    const container = document.getElementById('app');
                    const oldDiv = document.createElement('div');
                    const newDiv = document.createElement('div');
                    
                    oldDiv.innerHTML = currentHtml;
                    newDiv.innerHTML = nextHtml;
                    
                    oldDiv.style.position = 'absolute';
                    oldDiv.style.top = '0';
                    oldDiv.style.left = '0';
                    oldDiv.style.width = '100%';
                    oldDiv.style.minHeight = '100vh';
                    oldDiv.style.transition = 'transform 0.3s ease';
                    oldDiv.style.transform = 'translateX(0)';
                    
                    newDiv.style.position = 'absolute';
                    newDiv.style.top = '0';
                    newDiv.style.left = '0';
                    newDiv.style.width = '100%';
                    newDiv.style.minHeight = '100vh';
                    newDiv.style.transition = 'transform 0.3s ease';
                    newDiv.style.transform = 'translateX(-100%)'; // Начинаем слева (за экраном)
                    
                    container.style.position = 'relative';
                    container.style.minHeight = '100vh';
                    container.innerHTML = '';
                    container.appendChild(newDiv);
                    container.appendChild(oldDiv);
                    
                    // Запускаем анимацию через 10мс для гарантии
                    setTimeout(() => {
                        oldDiv.style.transform = 'translateX(100%)';  // Старый уезжает вправо
                        newDiv.style.transform = 'translateX(0)';      // Новый приезжает слева
                    }, 10);
                    
                    // После анимации переходим на главную страницу
                    setTimeout(() => {
                        navigate('main');
                        container.style.position = '';
                        container.style.minHeight = '';
                    }, 300);
                }
            }
        }
        
        // Добавляем обработчики к контейнеру приложения
                function enableSwipeToGoBack() {
            const appDiv = document.getElementById('app');
            if (appDiv) {
                appDiv.removeEventListener('touchstart', handleTouchStart);
                appDiv.removeEventListener('touchend', handleTouchEnd);
                appDiv.addEventListener('touchstart', handleTouchStart);
                appDiv.addEventListener('touchend', handleTouchEnd);
            }
        }

                // === КНОПКА "НАВЕРХ" ===
        
        let scrollTimeout = null;
        
        function checkScroll() {
            const btn = document.getElementById('scrollTopBtn');
            if (!btn) return;
            
            const scrollY = window.scrollY || window.pageYOffset;
            
            // Показываем кнопку ТОЛЬКО если прокрутили больше 300px
            if (scrollY > 300) {
                btn.classList.add('show');
            } else {
                btn.classList.remove('show');
            }
        }
        
        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }
        
        // Добавляем обработчик прокрутки
        window.addEventListener('scroll', function() {
            if (scrollTimeout) clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(checkScroll, 50);
        });
        
        // Вызываем проверку при загрузке и при изменении размера
        window.addEventListener('load', checkScroll);
        window.addEventListener('resize', checkScroll);

        // Главная функция рендеринга
                function render() {
            const appDiv = document.getElementById('app');
            if (!appDiv) return;
            
            let content = '';
            
            switch (currentPage) {
                case 'main':
                    content = renderMainMenu();
                    break;
                case 'routes':
                    content = renderRoutesList();
                    break;
                case 'route-detail':
                    content = renderRouteDetail();
                    break;
                case 'catalog':
                    content = renderCatalog();
                    break;
                case 'activate':
                    content = renderActivate();
                    break;
                case 'privacy':
                    content = renderPrivacy();
                    break;
                case 'achievements':
                    content = renderAchievements();
                    break;
                case 'map':
                    content = renderMap();
                    break;
                default:
                    content = renderMainMenu();
            }
            
            appDiv.innerHTML = content;
            
            // Сбрасываем проверку прокрутки при смене страницы
            setTimeout(() => {
                const btn = document.getElementById('scrollTopBtn');
                if (btn) {
                    btn.classList.remove('show');
                }
                // Принудительно скроллим наверх при смене страницы
                window.scrollTo(0, 0);
                checkScroll();
            }, 100);
            
            // Включаем свайп для возврата (кроме главной)
            if (currentPage !== 'main') {
                enableSwipeToGoBack();
            }
        }
        
        // Запускаем приложение
        initTelegram();
        
        // Делаем функции глобальными
        window.navigate = navigate;
        window.activateMask = activateMask;
        window.resetActivation = resetActivation;
        window.openLocation = openLocation;
        window.openMapForRoute = openMapForRoute;
        window.buyMask = buyMask;
        window.openSupport = openSupport;
        window.showSimpleMaskInfo = showSimpleMaskInfo;
        window.showExtendedMaskInfo = showExtendedMaskInfo;
        window.closeModal = closeModal;
        window.openRouteOnMap = openRouteOnMap;
window.showMapChooser = showMapChooser;
window.closeMapChooser = closeMapChooser;
window.openYandexMaps = openYandexMaps;
        window.showPrivacyPopup = showPrivacyPopup;
        window.closePrivacyPopup = closePrivacyPopup;
                window.scrollToTop = scrollToTop;
    </script>
