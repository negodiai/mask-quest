<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Админ-панель | НЕГОДЯЙ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #0f0f1e 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2d2d44;
        }
        
        .header h1 {
            font-size: 24px;
        }
        
        .back-btn {
            background: #252542;
            border: none;
            border-radius: 12px;
            padding: 10px 16px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: nowrap;
            overflow-x: auto;
        }
        
        .tab-btn {
            background: #252542;
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            color: #94a3b8;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        
        .tab-btn.active {
            background: #3B82F6;
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .card {
            background: #252542;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .card-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn-icon {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 16px;
            padding: 8px;
            transition: all 0.2s ease;
        }
        
        .btn-icon:hover {
            color: #fff;
        }
        
        .btn-publish {
            color: #10B981;
        }
        
        .btn-publish:hover {
            color: #059669;
        }
        
        .btn-danger {
            color: #EF4444;
        }
        
        .btn-danger:hover {
            color: #DC2626;
        }
        
        .btn-success {
            background: #10B981;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
        }
        
        .btn-primary {
            background: #3B82F6;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #94a3b8;
        }
        
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            background: #1a1a2e;
            border: 1px solid #2d2d44;
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }
        
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-container {
            background: #1a1a2e;
            border-radius: 24px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #2d2d44;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-content {
            padding: 20px;
        }

                .photo-upload-area {
            border: 1px dashed #3d3d5c;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 16px;
            background: #1a1a2e;
        }
        
        .photo-upload-area:hover {
            border-color: #3B82F6;
            background: rgba(59, 130, 246, 0.05);
        }
        
        .photo-upload-area i {
            font-size: 20px;
            color: #64748b;
            margin-right: 8px;
        }
        
        .photo-upload-area span {
            font-size: 13px;
            color: #94a3b8;
        }
        
        .photo-upload-area .upload-hint {
            font-size: 11px;
            color: #64748b;
            margin-left: 8px;
        }
        
        .photo-preview {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 10px;
            border: 1px solid #3d3d5c;
        }
        
        .photo-preview.hidden {
            display: none;
        }
        
        .photo-input {
            display: none;
        }
        
        .photo-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #3B82F6;
        }
        
        .stat-label {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }
        
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #2d2d44;
        }
        
        .route-checkbox {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid #2d2d44;
            cursor: pointer;
        }
        
        .route-checkbox input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .route-checkbox:hover {
            background: #2d2d54;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .badge-draft {
            background: #F59E0B;
            color: #1a1a2e;
        }
        
        .badge-published {
            background: #10B981;
            color: white;
        }
        
        .hidden {
            display: none;
        }
        
        .spinner {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        
        .message-success {
            background: #1a2e1a;
            color: #10B981;
        }
        
        .message-error {
            background: #2e1a1a;
            color: #EF4444;
        }

        .admin-scroll-top-btn {
            position: fixed;
            bottom: 50px;
            right: 50px;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: rgba(100, 116, 139, 0.5);
            backdrop-filter: blur(4px);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
        }
        
        .admin-scroll-top-btn:hover {
            transform: scale(1.05);
            background: rgba(100, 116, 139, 0.7);
        }
        
        .admin-scroll-top-btn.show {
            display: flex;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="spinner">Загрузка админ-панели...</div>
    </div>
    
    <button id="adminScrollTopBtn" class="admin-scroll-top-btn" onclick="adminScrollToTop()">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script>
        const API_BASE = window.location.origin + '/api';
        let currentUserId = null;
        let currentTab = 'masks';
        let masks = [];
        let routes = [];
        let allRoutes = [];
        
        function init() {
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                const user = tg.initDataUnsafe?.user;
                if (user && user.id) {
                    currentUserId = user.id.toString();
                }
            }
            
            if (!currentUserId) {
                currentUserId = prompt('Введите ваш Telegram ID для доступа к админ-панели:');
            }
            
            checkAdminAccess();
        }
        
        async function checkAdminAccess() {
            try {
                const response = await fetch(`${API_BASE}/admin/masks?userId=${currentUserId}`);
                if (response.status === 403) {
                    document.getElementById('app').innerHTML = `
                        <div class="container">
                            <div class="card" style="text-align: center; padding: 40px;">
                                <i class="fas fa-lock" style="font-size: 48px; color: #EF4444; margin-bottom: 16px;"></i>
                                <h2>Доступ запрещён</h2>
                                <p style="color: #64748b; margin-top: 16px;">У вас нет прав администратора.</p>
                                <p style="color: #64748b; margin-top: 8px; font-size: 12px;">Ваш Telegram ID: ${currentUserId}</p>
                                <button class="btn-success" onclick="location.href='/'">На главную</button>
                            </div>
                        </div>
                    `;
                    return;
                }
                await loadAllRoutes();
                loadAdminPanel();
            } catch (e) {
                console.error('Ошибка проверки доступа:', e);
            }
        }
        
        async function loadAllRoutes() {
            const res = await fetch(`${API_BASE}/admin/routes/list?userId=${currentUserId}`);
            allRoutes = await res.json();
        }
        
        async function loadAdminPanel() {
            await Promise.all([
                loadMasks(),
                loadRoutes(),
                loadStats()
            ]);
            renderAdminPanel();
        }
        
        async function loadMasks() {
            const res = await fetch(`${API_BASE}/admin/masks?userId=${currentUserId}`);
            masks = await res.json();
        }
        
        async function loadRoutes() {
            const res = await fetch(`${API_BASE}/admin/routes?userId=${currentUserId}`);
            routes = await res.json();
        }
        
        async function loadStats() {
            const res = await fetch(`${API_BASE}/admin/stats?userId=${currentUserId}`);
            window.stats = await res.json();
        }
        
        async function loadMaskRoutes(maskId) {
            const res = await fetch(`${API_BASE}/admin/masks/${maskId}/routes?userId=${currentUserId}`);
            return await res.json();
        }
        
        function renderAdminPanel() {
            const html = `
                <div class="header">
                    <h1><i class="fas fa-shield-alt"></i> Админ-панель</h1>
                    <div style="display: flex; gap: 8px;">
                        <button class="back-btn" onclick="refreshData()"><i class="fas fa-sync-alt"></i> Обновить</button>
                        <button class="back-btn" onclick="location.href='/'">← На главную</button>
                    </div>
                </div>
                
                <div class="admin-id-info" style="background: #2d2d44; border-radius: 12px; padding: 12px; margin-bottom: 20px; font-size: 13px;">
                    <i class="fas fa-id-badge"></i> Ваш ID: ${currentUserId}
                </div>
                
                <div class="tabs">
                    <button class="tab-btn ${currentTab === 'masks' ? 'active' : ''}" onclick="switchTab('masks')">📋 Маски</button>
                    <button class="tab-btn ${currentTab === 'routes' ? 'active' : ''}" onclick="switchTab('routes')">🗺️ Маршруты</button>
                    <button class="tab-btn ${currentTab === 'stats' ? 'active' : ''}" onclick="switchTab('stats')">📊 Статистика</button>
                </div>
                
                <div id="masks-tab" class="tab-content ${currentTab === 'masks' ? 'active' : ''}">
                    <button class="btn-success" onclick="showAddMaskModal()" style="margin-bottom: 16px;">
                        <i class="fas fa-plus"></i> Добавить маску
                    </button>
                    <div id="masks-list">${renderMasksList()}</div>
                </div>
                
                <div id="routes-tab" class="tab-content ${currentTab === 'routes' ? 'active' : ''}">
                    <button class="btn-success" onclick="showAddRouteModal()" style="margin-bottom: 16px;">
                        <i class="fas fa-plus"></i> Добавить маршрут
                    </button>
                    <div id="routes-list">${renderRoutesList()}</div>
                </div>
                
                <div id="stats-tab" class="tab-content ${currentTab === 'stats' ? 'active' : ''}">
                    ${renderStats()}
                </div>
            `;
            document.getElementById('app').innerHTML = html;
            setTimeout(() => adminCheckScroll(), 100);
        }
        
        function renderMasksList() {
            if (masks.length === 0) return '<p style="text-align: center; color: #64748b;">Нет масок</p>';
            return masks.map(mask => `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">${escapeHtml(mask.name)}</span>
                        <div class="card-actions">
                            ${!mask.isAvailable ? `<button class="btn-icon btn-publish" onclick="publishMask('${mask.id}')" title="Опубликовать"><i class="fas fa-cloud-upload-alt"></i></button>` : ''}
                            <button class="btn-icon" onclick="editMask('${mask.id}')" title="Редактировать"><i class="fas fa-edit"></i></button>
                            <button class="btn-icon btn-danger" onclick="deleteMask('${mask.id}')" title="Удалить"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div style="font-size: 12px; color: #64748b;">
                        <div>📝 ${escapeHtml(mask.subtitle || 'Без подзаголовка')}</div>
                        <div style="margin-top: 8px;">
                            ${mask.isAvailable ? '<span class="badge badge-published">✅ Опубликована</span>' : '<span class="badge badge-draft">📝 Черновик</span>'}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderRoutesList() {
            if (routes.length === 0) return '<p style="text-align: center; color: #64748b;">Нет маршрутов</p>';
            return routes.map(route => `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">${escapeHtml(route.name)}</span>
                        <div class="card-actions">
                            ${!route.isAvailable ? `<button class="btn-icon btn-publish" onclick="publishRoute('${route.id}')" title="Опубликовать"><i class="fas fa-cloud-upload-alt"></i></button>` : ''}
                            <button class="btn-icon" onclick="editRoute('${route.id}')" title="Редактировать"><i class="fas fa-edit"></i></button>
                            <button class="btn-icon btn-danger" onclick="deleteRoute('${route.id}')" title="Удалить"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div style="font-size: 12px; color: #64748b;">
                        <div>📏 ${route.distanceKm} км | ⏱️ ${route.durationMinutes} мин</div>
                        <div>📝 ${escapeHtml(route.description || 'Без описания')}</div>
                        <div style="margin-top: 8px;">
                            ${route.isAvailable ? '<span class="badge badge-published">✅ Опубликован</span>' : '<span class="badge badge-draft">📝 Черновик</span>'}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderStats() {
            const stats = window.stats || {};
            return `
                <div class="stat-grid">
                    <div class="stat-card"><div class="stat-value">${stats.totalUsers || 0}</div><div class="stat-label">Всего пользователей</div></div>
                    <div class="stat-card"><div class="stat-value">${stats.activeUsers || 0}</div><div class="stat-label">Активных за 7 дней</div></div>
                    <div class="stat-card"><div class="stat-value">${stats.totalActivations || 0}</div><div class="stat-label">Всего активаций</div></div>
                    <div class="stat-card"><div class="stat-value">${stats.totalMasks || 0}</div><div class="stat-label">Всего масок</div></div>
                    <div class="stat-card"><div class="stat-value">${stats.totalRoutes || 0}</div><div class="stat-label">Всего маршрутов</div></div>
                    <div class="stat-card"><div class="stat-value">${stats.completedRoutesTotal || 0}</div><div class="stat-label">Пройдено маршрутов</div></div>
                </div>
                <div class="card"><h3>🔥 Популярные маски</h3>${(stats.popularMasks || []).length ? stats.popularMasks.map(m => `<div class="list-item"><span>${escapeHtml(m.name)}</span><span style="color:#3B82F6;">${m.count} активаций</span></div>`).join('') : '<p style="color:#64748b;">Нет данных</p>'}</div>
                <div class="card"><h3>🏆 Популярные маршруты</h3>${(stats.popularRoutes || []).length ? stats.popularRoutes.map(r => `<div class="list-item"><span>${escapeHtml(r.name)}</span><span style="color:#3B82F6;">${r.count} прохождений</span></div>`).join('') : '<p style="color:#64748b;">Нет данных</p>'}</div>
                <div class="card"><h3>📅 Активации за 7 дней</h3>${(stats.dailyActivations || []).length ? stats.dailyActivations.map(d => `<div class="list-item"><span>${d.date}</span><span style="color:#3B82F6;">${d.count} активаций</span></div>`).join('') : '<p style="color:#64748b;">Нет данных</p>'}</div>
            `;
        }
        
        function switchTab(tab) { currentTab = tab; renderAdminPanel(); }
        
        async function publishMask(id) {
            if (!confirm('Опубликовать маску? Она станет доступна в каталоге.')) return;
            const res = await fetch(`${API_BASE}/admin/masks/${id}/publish?userId=${currentUserId}`, { method: 'POST' });
            if (res.ok) { showMessage('Маска опубликована!', 'success'); loadMasks().then(() => renderAdminPanel()); }
            else showMessage('Ошибка публикации', 'error');
        }
        
        async function publishRoute(id) {
            if (!confirm('Опубликовать маршрут? Он станет доступен пользователям.')) return;
            const res = await fetch(`${API_BASE}/admin/routes/${id}/publish?userId=${currentUserId}`, { method: 'POST' });
            if (res.ok) { showMessage('Маршрут опубликован!', 'success'); loadRoutes().then(() => renderAdminPanel()); }
            else showMessage('Ошибка публикации', 'error');
        }
        
        async function showAddMaskModal() {
            const routesHtml = allRoutes.map(route => `<label class="route-checkbox"><input type="checkbox" value="${route.id}" class="route-checkbox-input"><span>${escapeHtml(route.name)}</span></label>`).join('');
            let currentPhotoUrl = '';
            
            showModal('Добавить маску', `
                <div class="form-group"><label>Название *</label><input type="text" id="mask-name" placeholder="Например: Берёзовая"></div>

                <div class="form-group">
                    <label>Фото маски</label>
                    <div class="photo-upload-area" onclick="document.getElementById('mask-photo-input').click()">
                        <i class="fas fa-cloud-upload-alt" style="font-size:32px; color:#64748b; margin-bottom:8px; display:block;"></i>
                        <span>Нажмите для загрузки фото</span>
                        <span style="display:block; font-size:12px; color:#64748b; margin-top:4px;">JPEG, PNG, GIF, WEBP (до 5MB)</span>
                    </div>
                    <input type="file" id="mask-photo-input" class="photo-input" accept="image/*">
                    <img id="photo-preview" class="photo-preview hidden" src="">
                    <input type="hidden" id="mask-photoHash" value="">
                </div>
                <div class="form-group"><label>Подзаголовок (отображается на карточке в каталоге)</label><input type="text" id="mask-subtitle" placeholder="Краткий подзаголовок"></div>
                <div class="form-group"><label>Краткое описание (показывается внутри модального окна)</label><textarea id="mask-description" placeholder="Краткое описание маски"></textarea></div>
                <div class="form-group"><label>Номер маски (QR-код) *</label><input type="number" id="mask-number" placeholder="1, 2, 3..."><small style="color:#64748b;">Номер для QR-кода</small></div>
                <div class="form-group"><label>Цена (₽)</label><input type="number" id="mask-priceAmount" placeholder="15000"></div>
                <div class="form-group"><label>Яндекс.Карты (ссылка)</label><input type="text" id="mask-yandexMapLink" placeholder="https://yandex.ru/maps/..."></div>
                <div class="form-group"><label>Google Maps (ссылка)</label><input type="text" id="mask-googleMapLink" placeholder="https://maps.google.com/..."></div>
                <div class="form-group"><label>2GIS (ссылка)</label><input type="text" id="mask-twoGisLink" placeholder="https://2gis.ru/..."></div>
                <h3 style="margin-top:20px;">📖 Тексты для карточки маски</h3>
                <div class="form-group"><label>Настоящее</label><textarea id="mask-present_text" rows="4" placeholder="Текст для вкладки 'Настоящее'"></textarea></div>
                <div class="form-group"><label>СССР</label><textarea id="mask-ussr_text" rows="4" placeholder="Текст для вкладки 'СССР'"></textarea></div>
                <div class="form-group"><label>Прошлое</label><textarea id="mask-past_text" rows="4" placeholder="Текст для вкладки 'Прошлое'"></textarea></div>
                <div class="form-group"><label>Добавить в маршруты</label><div id="routes-list-modal">${routesHtml || '<p>Нет маршрутов</p>'}</div></div>
            `, async () => {
                const selectedRoutes = [...document.querySelectorAll('.route-checkbox-input:checked')].map(cb => cb.value);
                const newMask = {
                    name: document.getElementById('mask-name').value,
                    subtitle: document.getElementById('mask-subtitle').value,
                    description: document.getElementById('mask-description').value,
                    number: parseInt(document.getElementById('mask-number').value),
                    priceAmount: parseInt(document.getElementById('mask-priceAmount').value) || 15000,
                    yandexMapLink: document.getElementById('mask-yandexMapLink').value,
                    googleMapLink: document.getElementById('mask-googleMapLink').value,
                    twoGisLink: document.getElementById('mask-twoGisLink').value,
                    present_text: document.getElementById('mask-present_text').value,
                    ussr_text: document.getElementById('mask-ussr_text').value,
                    past_text: document.getElementById('mask-past_text').value,
                    photoHash: currentPhotoUrl
                };
                const res = await fetch(`${API_BASE}/admin/masks?userId=${currentUserId}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newMask) });
                const result = await res.json();
                if (res.ok) {
                    for (const routeId of selectedRoutes) await fetch(`${API_BASE}/admin/masks/${result.id}/routes/${routeId}?userId=${currentUserId}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ order: 0 }) });
                    showMessage('Маска добавлена как черновик!', 'success');
                    loadMasks().then(() => renderAdminPanel());
                } else showMessage('Ошибка добавления', 'error');
            });
            
            setTimeout(() => {
                document.getElementById('mask-photo-input').addEventListener('change', async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const formData = new FormData();
                    formData.append('photo', file);
                    showMessage('Загрузка фото...', 'info');
                    try {
                        const res = await fetch(`${API_BASE}/admin/upload-photo?userId=${currentUserId}`, { method: 'POST', body: formData });
                        const result = await res.json();
                        if (res.ok) {
                            currentPhotoUrl = result.photoUrl;
                            document.getElementById('photo-preview').src = currentPhotoUrl;
                            document.getElementById('photo-preview').classList.remove('hidden');
                            showMessage('Фото загружено!', 'success');
                        } else showMessage('Ошибка загрузки фото', 'error');
                    } catch (err) { showMessage('Ошибка загрузки фото', 'error'); }
                });
            }, 200);
        }
        
        async function editMask(id) {
            const mask = masks.find(m => m.id === id);
            if (!mask) return;
            const maskRoutes = await loadMaskRoutes(id);
            const maskRouteIds = new Set(maskRoutes.map(r => r.id));
            const routesHtml = allRoutes.map(route => `<label class="route-checkbox"><input type="checkbox" value="${route.id}" class="route-checkbox-input" ${maskRouteIds.has(route.id) ? 'checked' : ''}><span>${escapeHtml(route.name)}</span></label>`).join('');
            let currentPhotoUrl = mask.photoHash || '';
            
            showModal('Редактировать маску', `
                <div class="form-group"><label>Название</label><input type="text" id="mask-name" value="${escapeHtml(mask.name)}"></div>

                <div class="form-group">
                    <label>Фото маски</label>
                    <div class="photo-upload-area" onclick="document.getElementById('mask-photo-input').click()">
                        <i class="fas fa-cloud-upload-alt" style="font-size:32px; color:#64748b; margin-bottom:8px; display:block;"></i>
                        <span>Нажмите для загрузки нового фото</span>
                    </div>
                    <input type="file" id="mask-photo-input" class="photo-input" accept="image/*">
                    <img id="photo-preview" class="photo-preview ${!currentPhotoUrl ? 'hidden' : ''}" src="${currentPhotoUrl}">
                    <input type="hidden" id="mask-photoHash" value="${currentPhotoUrl}">
                </div>
                <div class="form-group"><label>Подзаголовок</label><input type="text" id="mask-subtitle" value="${escapeHtml(mask.subtitle || '')}"></div>
                <div class="form-group"><label>Краткое описание</label><textarea id="mask-description">${escapeHtml(mask.description || '')}</textarea></div>
                <div class="form-group"><label>Номер маски (QR-код)</label><input type="number" id="mask-number" value="${mask.number || ''}"></div>
                <div class="form-group"><label>Цена (₽)</label><input type="number" id="mask-priceAmount" value="${mask.priceAmount || 15000}"></div>
                <div class="form-group"><label>Яндекс.Карты</label><input type="text" id="mask-yandexMapLink" value="${escapeHtml(mask.yandexMapLink || '')}"></div>
                <div class="form-group"><label>Google Maps</label><input type="text" id="mask-googleMapLink" value="${escapeHtml(mask.googleMapLink || '')}"></div>
                <div class="form-group"><label>2GIS</label><input type="text" id="mask-twoGisLink" value="${escapeHtml(mask.twoGisLink || '')}"></div>
                <h3>📖 Тексты для карточки</h3>
                <div class="form-group"><label>Настоящее</label><textarea id="mask-present_text" rows="4">${escapeHtml(mask.present_text || '')}</textarea></div>
                <div class="form-group"><label>СССР</label><textarea id="mask-ussr_text" rows="4">${escapeHtml(mask.ussr_text || '')}</textarea></div>
                <div class="form-group"><label>Прошлое</label><textarea id="mask-past_text" rows="4">${escapeHtml(mask.past_text || '')}</textarea></div>
                <div class="form-group"><label>Добавить в маршруты</label><div id="routes-list-modal">${routesHtml || '<p>Нет маршрутов</p>'}</div></div>
            `, async () => {
                const selectedRoutes = [...document.querySelectorAll('.route-checkbox-input:checked')].map(cb => cb.value);
                const updatedMask = {
                    name: document.getElementById('mask-name').value,
                    subtitle: document.getElementById('mask-subtitle').value,
                    description: document.getElementById('mask-description').value,
                    number: parseInt(document.getElementById('mask-number').value),
                    priceAmount: parseInt(document.getElementById('mask-priceAmount').value),
                    isAvailable: mask.isAvailable,
                    yandexMapLink: document.getElementById('mask-yandexMapLink').value,
                    googleMapLink: document.getElementById('mask-googleMapLink').value,
                    twoGisLink: document.getElementById('mask-twoGisLink').value,
                    present_text: document.getElementById('mask-present_text').value,
                    ussr_text: document.getElementById('mask-ussr_text').value,
                    past_text: document.getElementById('mask-past_text').value,
                    photoHash: document.getElementById('mask-photoHash').value
                };
                const res = await fetch(`${API_BASE}/admin/masks/${id}?userId=${currentUserId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updatedMask) });
                if (res.ok) {
                    for (const routeId of selectedRoutes) if (!maskRouteIds.has(routeId)) await fetch(`${API_BASE}/admin/masks/${id}/routes/${routeId}?userId=${currentUserId}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ order: 0 }) });
                    for (const routeId of maskRouteIds) if (!selectedRoutes.includes(routeId)) await fetch(`${API_BASE}/admin/masks/${id}/routes/${routeId}?userId=${currentUserId}`, { method: 'DELETE' });
                    showMessage('Маска обновлена!', 'success');
                    loadMasks().then(() => renderAdminPanel());
                    if (window.opener && !window.opener.closed) window.opener.postMessage('masksUpdated', '*');
                } else showMessage('Ошибка обновления', 'error');
            });
            
            setTimeout(() => {
                document.getElementById('mask-photo-input').addEventListener('change', async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const formData = new FormData();
                    formData.append('photo', file);
                    showMessage('Загрузка фото...', 'info');
                    try {
                        const res = await fetch(`${API_BASE}/admin/upload-photo?userId=${currentUserId}`, { method: 'POST', body: formData });
                        const result = await res.json();
                        if (res.ok) {
                            currentPhotoUrl = result.photoUrl;
                            document.getElementById('photo-preview').src = currentPhotoUrl;
                            document.getElementById('photo-preview').classList.remove('hidden');
                            document.getElementById('mask-photoHash').value = currentPhotoUrl;
                            showMessage('Фото загружено!', 'success');
                        } else showMessage('Ошибка загрузки фото', 'error');
                    } catch (err) { showMessage('Ошибка загрузки фото', 'error'); }
                });
            }, 200);
        }
        
        async function deleteMask(id) {
            if (!confirm('Удалить маску?')) return;
            const res = await fetch(`${API_BASE}/admin/masks/${id}?userId=${currentUserId}`, { method: 'DELETE' });
            if (res.ok) { showMessage('Маска удалена', 'success'); loadMasks().then(() => renderAdminPanel()); }
            else showMessage('Ошибка удаления', 'error');
        }
        
        function showAddRouteModal() {
            showModal('Добавить маршрут', `
                <div class="form-group"><label>Название *</label><input type="text" id="route-name" placeholder="Например: Исторический центр"></div>
                <div class="form-group"><label>Описание</label><textarea id="route-description" placeholder="Описание маршрута"></textarea></div>
                <div class="form-group"><label>Длительность (минут)</label><input type="number" id="route-durationMinutes" placeholder="60"></div>
                <div class="form-group"><label>Дистанция (км)</label><input type="text" id="route-distanceKm" placeholder="2.5"></div>
            `, async () => {
                const newRoute = {
                    name: document.getElementById('route-name').value,
                    description: document.getElementById('route-description').value,
                    durationMinutes: parseInt(document.getElementById('route-durationMinutes').value) || 60,
                    distanceKm: parseFloat(document.getElementById('route-distanceKm').value) || 1,
                    isActive: true
                };
                const res = await fetch(`${API_BASE}/admin/routes?userId=${currentUserId}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newRoute) });
                if (res.ok) { showMessage('Маршрут добавлен!', 'success'); await loadAllRoutes(); loadRoutes().then(() => renderAdminPanel()); }
                else showMessage('Ошибка добавления', 'error');
            });
        }
        
        async function editRoute(id) {
            const route = routes.find(r => r.id === id);
            if (!route) return;
            showModal('Редактировать маршрут', `
                <div class="form-group"><label>Название</label><input type="text" id="route-name" value="${escapeHtml(route.name)}"></div>
                <div class="form-group"><label>Описание</label><textarea id="route-description">${escapeHtml(route.description || '')}</textarea></div>
                <div class="form-group"><label>Длительность (минут)</label><input type="number" id="route-durationMinutes" value="${route.durationMinutes}"></div>
                <div class="form-group"><label>Дистанция (км)</label><input type="text" id="route-distanceKm" value="${route.distanceKm}"></div>
            `, async () => {
                const updatedRoute = {
                    name: document.getElementById('route-name').value,
                    description: document.getElementById('route-description').value,
                    durationMinutes: parseInt(document.getElementById('route-durationMinutes').value),
                    distanceKm: parseFloat(document.getElementById('route-distanceKm').value),
                    isAvailable: route.isAvailable
                };
                const res = await fetch(`${API_BASE}/admin/routes/${id}?userId=${currentUserId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updatedRoute) });
                if (res.ok) { showMessage('Маршрут обновлён!', 'success'); loadRoutes().then(() => renderAdminPanel()); }
                else showMessage('Ошибка обновления', 'error');
            });
        }
        
        async function deleteRoute(id) {
            if (!confirm('Удалить маршрут?')) return;
            const res = await fetch(`${API_BASE}/admin/routes/${id}?userId=${currentUserId}`, { method: 'DELETE' });
            if (res.ok) { showMessage('Маршрут удалён', 'success'); await loadAllRoutes(); loadRoutes().then(() => renderAdminPanel()); }
            else showMessage('Ошибка удаления', 'error');
        }
        
        function showModal(title, content, onSave) {
            const modalHtml = `<div id="admin-modal" class="modal-overlay"><div class="modal-container"><div class="modal-header"><h3>${title}</h3><button class="btn-icon" onclick="closeModal()">&times;</button></div><div class="modal-content">${content}<button class="btn-success" onclick="saveModal()" style="margin-top:16px;">Сохранить</button></div></div></div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            window.modalOnSave = onSave;
        }
        
        function closeModal() { document.getElementById('admin-modal')?.remove(); }
        function saveModal() { if (window.modalOnSave) window.modalOnSave(); closeModal(); }
        
        let messageTimeout = null;
        function showMessage(text, type) {
            document.querySelector('.message')?.remove();
            if (messageTimeout) clearTimeout(messageTimeout);
            const msg = document.createElement('div');
            msg.className = `message message-${type}`;
            msg.innerHTML = text;
            document.querySelector('.container').insertBefore(msg, document.querySelector('.container').firstChild);
            messageTimeout = setTimeout(() => msg.remove(), 3000);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
        
        function adminCheckScroll() {
            const btn = document.getElementById('adminScrollTopBtn');
            if (!btn) return;
            if ((window.scrollY || window.pageYOffset) > 300) btn.classList.add('show');
            else btn.classList.remove('show');
        }
        
        function adminScrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
        
        window.addEventListener('scroll', adminCheckScroll);
        window.addEventListener('load', adminCheckScroll);
        
        async function refreshData() {
            showMessage('Обновление данных...', 'info');
            await Promise.all([loadMasks(), loadRoutes(), loadStats()]);
            renderAdminPanel();
            showMessage('Данные обновлены', 'success');
        }
        
        window.adminScrollToTop = adminScrollToTop;
        window.publishRoute = publishRoute;
        init();
    </script>
</body>
</html>
