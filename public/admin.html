<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Админ-панель | НЕГОДЯЙ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #0f0f1e 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2d2d44;
        }
        
        .header h1 {
            font-size: 24px;
        }
        
        .back-btn {
            background: #252542;
            border: none;
            border-radius: 12px;
            padding: 10px 16px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            background: #252542;
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            color: #94a3b8;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        
        .tab-btn.active {
            background: #3B82F6;
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .card {
            background: #252542;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .card-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn-icon {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 16px;
            padding: 8px;
            transition: all 0.2s ease;
        }
        
        .btn-icon:hover {
            color: #fff;
        }
        
        .btn-publish {
            color: #10B981;
        }
        
        .btn-publish:hover {
            color: #059669;
        }
        
        .btn-danger {
            color: #EF4444;
        }
        
        .btn-danger:hover {
            color: #DC2626;
        }
        
        .btn-success {
            background: #10B981;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
        }
        
        .btn-primary {
            background: #3B82F6;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #94a3b8;
        }
        
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            background: #1a1a2e;
            border: 1px solid #2d2d44;
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }
        
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-container {
            background: #1a1a2e;
            border-radius: 24px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #2d2d44;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-content {
            padding: 20px;
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #3B82F6;
        }
        
        .stat-label {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }
        
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #2d2d44;
        }
        
        .route-checkbox {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid #2d2d44;
            cursor: pointer;
        }
        
        .route-checkbox input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .route-checkbox:hover {
            background: #2d2d54;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .badge-draft {
            background: #F59E0B;
            color: #1a1a2e;
        }
        
        .badge-published {
            background: #10B981;
            color: white;
        }
        
        .hidden {
            display: none;
        }
        
        .spinner {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        
        .message-success {
            background: #1a2e1a;
            color: #10B981;
        }
        
        .message-error {
            background: #2e1a1a;
            color: #EF4444;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="spinner">Загрузка админ-панели...</div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        let currentUserId = null;
        let currentTab = 'masks';
        let masks = [];
        let routes = [];
        let allRoutes = [];
        
        // Получаем Telegram ID
        function init() {
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                const user = tg.initDataUnsafe?.user;
                if (user && user.id) {
                    currentUserId = user.id.toString();
                }
            }
            
            if (!currentUserId) {
                currentUserId = prompt('Введите ваш Telegram ID для доступа к админ-панели:');
            }
            
            checkAdminAccess();
        }
        
        async function checkAdminAccess() {
            try {
                const response = await fetch(`${API_BASE}/admin/masks?userId=${currentUserId}`);
                if (response.status === 403) {
                    document.getElementById('app').innerHTML = `
                        <div class="container">
                            <div class="card" style="text-align: center; padding: 40px;">
                                <i class="fas fa-lock" style="font-size: 48px; color: #EF4444; margin-bottom: 16px;"></i>
                                <h2>Доступ запрещён</h2>
                                <p style="color: #64748b; margin-top: 16px;">У вас нет прав администратора.</p>
                                <p style="color: #64748b; margin-top: 8px; font-size: 12px;">Ваш Telegram ID: ${currentUserId}</p>
                                <button class="btn-success" onclick="location.href='/'">На главную</button>
                            </div>
                        </div>
                    `;
                    return;
                }
                await loadAllRoutes();
                loadAdminPanel();
            } catch (e) {
                console.error('Ошибка проверки доступа:', e);
            }
        }
        
        async function loadAllRoutes() {
            const res = await fetch(`${API_BASE}/admin/routes/list?userId=${currentUserId}`);
            allRoutes = await res.json();
        }
        
        async function loadAdminPanel() {
            await Promise.all([
                loadMasks(),
                loadRoutes(),
                loadStats()
            ]);
            renderAdminPanel();
        }
        
        async function loadMasks() {
            const res = await fetch(`${API_BASE}/admin/masks?userId=${currentUserId}`);
            masks = await res.json();
        }
        
        async function loadRoutes() {
            const res = await fetch(`${API_BASE}/admin/routes?userId=${currentUserId}`);
            routes = await res.json();
        }
        
        async function loadStats() {
            const res = await fetch(`${API_BASE}/admin/stats?userId=${currentUserId}`);
            window.stats = await res.json();
        }
        
        async function loadMaskRoutes(maskId) {
            const res = await fetch(`${API_BASE}/admin/masks/${maskId}/routes?userId=${currentUserId}`);
            return await res.json();
        }
        
        function renderAdminPanel() {
            const html = `
                                <div class="header">
                    <h1><i class="fas fa-shield-alt"></i> Админ-панель</h1>
                    <div style="display: flex; gap: 8px;">
                        <button class="back-btn" onclick="refreshData()"><i class="fas fa-sync-alt"></i> Обновить</button>
                        <button class="back-btn" onclick="location.href='/'">← На главную</button>
                    </div>
                </div>
                
                <div class="admin-id-info" style="background: #2d2d44; border-radius: 12px; padding: 12px; margin-bottom: 20px; font-size: 13px;">
                    <i class="fas fa-id-badge"></i> Ваш ID: ${currentUserId}
                </div>
                
                <div class="tabs">
                    <button class="tab-btn ${currentTab === 'masks' ? 'active' : ''}" onclick="switchTab('masks')">📋 Маски</button>
                    <button class="tab-btn ${currentTab === 'routes' ? 'active' : ''}" onclick="switchTab('routes')">🗺️ Маршруты</button>
                    <button class="tab-btn ${currentTab === 'stats' ? 'active' : ''}" onclick="switchTab('stats')">📊 Статистика</button>
                </div>
                
                <div id="masks-tab" class="tab-content ${currentTab === 'masks' ? 'active' : ''}">
                    <button class="btn-success" onclick="showAddMaskModal()" style="margin-bottom: 16px;">
                        <i class="fas fa-plus"></i> Добавить маску
                    </button>
                    <div id="masks-list">
                        ${renderMasksList()}
                    </div>
                </div>
                
                <div id="routes-tab" class="tab-content ${currentTab === 'routes' ? 'active' : ''}">
                    <button class="btn-success" onclick="showAddRouteModal()" style="margin-bottom: 16px;">
                        <i class="fas fa-plus"></i> Добавить маршрут
                    </button>
                    <div id="routes-list">
                        ${renderRoutesList()}
                    </div>
                </div>
                
                <div id="stats-tab" class="tab-content ${currentTab === 'stats' ? 'active' : ''}">
                    ${renderStats()}
                </div>
            `;
            document.getElementById('app').innerHTML = html;
        }
        
        function renderMasksList() {
            if (masks.length === 0) return '<p style="text-align: center; color: #64748b;">Нет масок</p>';
            
            return masks.map(mask => `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">${escapeHtml(mask.name)}</span>
                        <div class="card-actions">
                            ${!mask.isAvailable ? `<button class="btn-icon btn-publish" onclick="publishMask('${mask.id}')" title="Опубликовать"><i class="fas fa-cloud-upload-alt"></i></button>` : ''}
                            <button class="btn-icon" onclick="editMask('${mask.id}')" title="Редактировать"><i class="fas fa-edit"></i></button>
                            <button class="btn-icon btn-danger" onclick="deleteMask('${mask.id}')" title="Удалить"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div style="font-size: 12px; color: #64748b;">
                        <div>📍 ${mask.latitude}, ${mask.longitude}</div>
                        <div>📝 ${escapeHtml(mask.description || 'Без описания')}</div>
                        <div style="margin-top: 8px;">
                            ${mask.isAvailable ? '<span class="badge badge-published">✅ Опубликована</span>' : '<span class="badge badge-draft">📝 Черновик</span>'}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderRoutesList() {
            if (routes.length === 0) return '<p style="text-align: center; color: #64748b;">Нет маршрутов</p>';
            
            return routes.map(route => `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">${escapeHtml(route.name)}</span>
                        <div class="card-actions">
                            <button class="btn-icon" onclick="editRoute('${route.id}')" title="Редактировать"><i class="fas fa-edit"></i></button>
                            <button class="btn-icon btn-danger" onclick="deleteRoute('${route.id}')" title="Удалить"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div style="font-size: 12px; color: #64748b;">
                        <div>📏 ${route.distanceKm} км | ⏱️ ${route.durationMinutes} мин</div>
                        <div>📝 ${escapeHtml(route.description || 'Без описания')}</div>
                    </div>
                </div>
            `).join('');
        }
        
                function renderStats() {
            const stats = window.stats || {};
            return `
                <div class="stat-grid">
                    <div class="stat-card">
                        <div class="stat-value">${stats.totalUsers || 0}</div>
                        <div class="stat-label">Всего пользователей</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.activeUsers || 0}</div>
                        <div class="stat-label">Активных за 7 дней</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.totalActivations || 0}</div>
                        <div class="stat-label">Всего активаций</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.totalMasks || 0}</div>
                        <div class="stat-label">Всего масок</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.totalRoutes || 0}</div>
                        <div class="stat-label">Всего маршрутов</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.completedRoutesTotal || 0}</div>
                        <div class="stat-label">Пройдено маршрутов</div>
                    </div>
                </div>
                
                <div class="card">
                    <h3 style="margin-bottom: 12px;">🔥 Популярные маски</h3>
                    ${(stats.popularMasks || []).length > 0 ? 
                        stats.popularMasks.map(m => `
                            <div class="list-item">
                                <span>${escapeHtml(m.name)}</span>
                                <span style="color: #3B82F6;">${m.count} активаций</span>
                            </div>
                        `).join('') : 
                        '<p style="color: #64748b;">Нет данных</p>'
                    }
                </div>
                
                <div class="card">
                    <h3 style="margin-bottom: 12px;">🏆 Популярные маршруты</h3>
                    ${(stats.popularRoutes || []).length > 0 ? 
                        stats.popularRoutes.map(r => `
                            <div class="list-item">
                                <span>${escapeHtml(r.name)}</span>
                                <span style="color: #3B82F6;">${r.count} прохождений</span>
                            </div>
                        `).join('') : 
                        '<p style="color: #64748b;">Нет данных</p>'
                    }
                </div>
                
                <div class="card">
                    <h3 style="margin-bottom: 12px;">📅 Активации за 7 дней</h3>
                    ${(stats.dailyActivations || []).length > 0 ? 
                        stats.dailyActivations.map(d => `
                            <div class="list-item">
                                <span>${d.date}</span>
                                <span style="color: #3B82F6;">${d.count} активаций</span>
                            </div>
                        `).join('') : 
                        '<p style="color: #64748b;">Нет данных</p>'
                    }
                </div>
            `;
        }
        
        function switchTab(tab) {
            currentTab = tab;
            renderAdminPanel();
        }
        
        async function publishMask(id) {
            if (!confirm('Опубликовать маску? Она станет доступна в каталоге для всех пользователей.')) return;
            
            const res = await fetch(`${API_BASE}/admin/masks/${id}/publish?userId=${currentUserId}`, {
                method: 'POST'
            });
            
            if (res.ok) {
                showMessage('Маска опубликована!', 'success');
                loadMasks().then(() => renderAdminPanel());
            } else {
                showMessage('Ошибка публикации', 'error');
            }
        }
        
                        async function showAddMaskModal() {
            const maskRoutes = allRoutes.map(r => ({ id: r.id, name: r.name, checked: false }));
            
            const routesHtml = maskRoutes.map(route => `
                <label class="route-checkbox">
                    <input type="checkbox" value="${route.id}" class="route-checkbox-input">
                    <span>${escapeHtml(route.name)}</span>
                </label>
            `).join('');
            
            const modalHtml = `
                <div id="admin-modal" class="modal-overlay" onclick="if(event.target === this) closeModal()">
                    <div class="modal-container" style="max-width: 500px;">
                        <div class="modal-header">
                            <h3>Добавить маску</h3>
                            <button class="btn-icon" onclick="closeModal()">&times;</button>
                        </div>
                        <div class="modal-content">
                            <form id="add-mask-form" enctype="multipart/form-data">
                                <div class="form-group">
                                    <label>Название *</label>
                                    <input type="text" name="name" id="mask-name" placeholder="Например: Берёзовая">
                                </div>
                                <div class="form-group">
                                    <label>Краткое описание</label>
                                    <textarea name="description" id="mask-description" placeholder="Краткое описание маски"></textarea>
                                </div>
                                <div class="form-group">
                                    <label>Полное описание</label>
                                    <textarea name="fullDescription" id="mask-fullDescription" placeholder="Полное описание (после активации)"></textarea>
                                </div>
                                <div class="form-group">
                                    <label>Фото</label>
                                    <input type="file" name="photo" id="mask-photo" accept="image/*">
                                </div>
                                <div class="form-group">
                                    <label>Широта *</label>
                                    <input type="text" name="latitude" id="mask-latitude" placeholder="54.679629">
                                </div>
                                <div class="form-group">
                                    <label>Долгота *</label>
                                    <input type="text" name="longitude" id="mask-longitude" placeholder="20.463649">
                                </div>
                                <div class="form-group">
                                    <label>Адрес</label>
                                    <input type="text" name="address" id="mask-address" placeholder="ул. Берёзовая">
                                </div>
                                <div class="form-group">
                                    <label>QR-код (уникальный) *</label>
                                    <input type="text" name="qrCode" id="mask-qrCode" placeholder="MASK_001">
                                </div>
                                <div class="form-group">
                                    <label>Цена (₽)</label>
                                    <input type="number" name="priceAmount" id="mask-priceAmount" placeholder="15000">
                                </div>
                                <div class="form-group">
                                    <label>Яндекс.Карты (ссылка)</label>
                                    <input type="text" name="yandexMapLink" id="mask-yandexMapLink" placeholder="https://yandex.ru/maps/...">
                                </div>
                                <div class="form-group">
                                    <label>Google Maps (ссылка)</label>
                                    <input type="text" name="googleMapLink" id="mask-googleMapLink" placeholder="https://maps.google.com/...">
                                </div>
                                <div class="form-group">
                                    <label>2GIS (ссылка)</label>
                                    <input type="text" name="twoGisLink" id="mask-twoGisLink" placeholder="https://2gis.ru/...">
                                </div>
                                <div class="form-group">
                                    <label>Добавить в маршруты</label>
                                    <div id="routes-list-modal" style="max-height: 200px; overflow-y: auto; background: #1a1a2e; border-radius: 10px;">
                                        ${routesHtml || '<p style="padding: 12px;">Нет маршрутов</p>'}
                                    </div>
                                </div>
                                <button type="button" class="btn-success" onclick="saveAddMask()" style="margin-top: 16px;">Сохранить</button>
                            </form>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }
        
        async function saveAddMask() {
            const form = document.getElementById('add-mask-form');
            const formData = new FormData(form);
            
            // Добавляем выбранные маршруты
            const selectedRoutes = [];
            document.querySelectorAll('.route-checkbox-input:checked').forEach(cb => {
                selectedRoutes.push(cb.value);
            });
            formData.append('selectedRoutes', JSON.stringify(selectedRoutes));
            
            // Добавляем остальные поля
            formData.append('name', document.getElementById('mask-name').value);
            formData.append('description', document.getElementById('mask-description').value);
            formData.append('fullDescription', document.getElementById('mask-fullDescription').value);
            formData.append('latitude', document.getElementById('mask-latitude').value);
            formData.append('longitude', document.getElementById('mask-longitude').value);
            formData.append('address', document.getElementById('mask-address').value);
            formData.append('qrCode', document.getElementById('mask-qrCode').value);
            formData.append('priceAmount', document.getElementById('mask-priceAmount').value);
            formData.append('yandexMapLink', document.getElementById('mask-yandexMapLink').value);
            formData.append('googleMapLink', document.getElementById('mask-googleMapLink').value);
            formData.append('twoGisLink', document.getElementById('mask-twoGisLink').value);
            
            const res = await fetch(`${API_BASE}/admin/masks?userId=${currentUserId}`, {
                method: 'POST',
                body: formData
            });
            
            const result = await res.json();
            
            if (res.ok) {
                const maskId = result.id;
                // Добавляем маску в выбранные маршруты
                for (const routeId of selectedRoutes) {
                    await fetch(`${API_BASE}/admin/masks/${maskId}/routes/${routeId}?userId=${currentUserId}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ order: 0 })
                    });
                }
                showMessage('Маска добавлена как черновик!', 'success');
                closeModal();
                loadMasks().then(() => renderAdminPanel());
            } else {

        async function saveEditMask(maskId) {
            const form = document.getElementById('edit-mask-form');
            const formData = new FormData(form);
            
            // Добавляем остальные поля
            formData.append('isAvailable', window.currentMaskIsAvailable || 0);
            
            const res = await fetch(`${API_BASE}/admin/masks/${maskId}?userId=${currentUserId}`, {
                method: 'PUT',
                body: formData
            });
            
            const result = await res.json();
            
            if (res.ok) {
                // Обновляем связи с маршрутами
                const selectedRoutes = [];
                document.querySelectorAll('.route-checkbox-input:checked').forEach(cb => {
                    selectedRoutes.push(cb.value);
                });
                
                // Здесь нужно обновить связи (как в editMask)
                showMessage('Маска обновлена!', 'success');
                closeModal();
                loadMasks().then(() => renderAdminPanel());
            } else {
                showMessage(result.error || 'Ошибка обновления', 'error');
            }
        }

        let activeModal = null;
        
        function showModal(title, content, onSave) {
            const modalHtml = `
                <div id="admin-modal" class="modal-overlay">
                    <div class="modal-container">
                        <div class="modal-header">
                            <h3>${title}</h3>
                            <button class="btn-icon" onclick="closeModal()">&times;</button>
                        </div>
                        <div class="modal-content">
                            ${content}
                            <button class="btn-success" onclick="saveModal()" style="margin-top: 16px;">Сохранить</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            window.modalOnSave = onSave;
        }
        
        function closeModal() {
            const modal = document.getElementById('admin-modal');
            if (modal) modal.remove();
        }
        
        function saveModal() {
            if (window.modalOnSave) window.modalOnSave();
            closeModal();
        }
        
        let messageTimeout = null;
        
        function showMessage(text, type) {
            const existing = document.querySelector('.message');
            if (existing) existing.remove();
            if (messageTimeout) clearTimeout(messageTimeout);
            
            const msg = document.createElement('div');
            msg.className = `message message-${type}`;
            msg.innerHTML = text;
            document.querySelector('.container').insertBefore(msg, document.querySelector('.container').firstChild);
            
            messageTimeout = setTimeout(() => msg.remove(), 3000);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

                async function refreshData() {

                loadMasks(),
                loadRoutes(),
                loadStats()
            ]);
            renderAdminPanel();
            showMessage('Данные обновлены', 'success');
        }
