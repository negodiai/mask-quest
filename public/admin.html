<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Админ-панель | НЕГОДЯЙ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #0f0f1e 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2d2d44;
        }
        
        .header h1 {
            font-size: 24px;
        }
        
        .back-btn {
            background: #252542;
            border: none;
            border-radius: 12px;
            padding: 10px 16px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            background: #252542;
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            color: #94a3b8;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        
        .tab-btn.active {
            background: #3B82F6;
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .card {
            background: #252542;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .btn-icon {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 16px;
            padding: 8px;
            margin-left: 8px;
        }
        
        .btn-icon:hover {
            color: #fff;
        }
        
        .btn-danger {
            color: #EF4444;
        }
        
        .btn-success {
            background: #10B981;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #94a3b8;
        }
        
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            background: #1a1a2e;
            border: 1px solid #2d2d44;
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }
        
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-container {
            background: #1a1a2e;
            border-radius: 24px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #2d2d44;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-content {
            padding: 20px;
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #3B82F6;
        }
        
        .stat-label {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }
        
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #2d2d44;
        }
        
        .hidden {
            display: none;
        }
        
        .spinner {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        
        .message-success {
            background: #1a2e1a;
            color: #10B981;
        }
        
        .message-error {
            background: #2e1a1a;
            color: #EF4444;
        }
        
        .admin-id-info {
            background: #2d2d44;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #94a3b8;
        }

                .btn-publish {
            color: #10B981;
        }
        
        .btn-publish:hover {
            color: #059669;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="spinner">Загрузка админ-панели...</div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        let currentUserId = null;
        
        // Получаем Telegram ID
        function init() {
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                const user = tg.initDataUnsafe?.user;
                if (user && user.id) {
                    currentUserId = user.id.toString();
                }
            }
            
            if (!currentUserId) {
                currentUserId = prompt('Введите ваш Telegram ID для доступа к админ-панели:');
            }
            
            checkAdminAccess();
        }
        
        async function checkAdminAccess() {
            try {
                const response = await fetch(`${API_BASE}/admin/masks?userId=${currentUserId}`);
                if (response.status === 403) {
                    document.getElementById('app').innerHTML = `
                        <div class="container">
                            <div class="card" style="text-align: center; padding: 40px;">
                                <i class="fas fa-lock" style="font-size: 48px; color: #EF4444; margin-bottom: 16px;"></i>
                                <h2>Доступ запрещён</h2>
                                <p style="color: #64748b; margin-top: 16px;">У вас нет прав администратора.</p>
                                <p style="color: #64748b; margin-top: 8px; font-size: 12px;">Ваш Telegram ID: ${currentUserId}</p>
                                <button class="btn-success" onclick="location.href='/'">На главную</button>
                            </div>
                        </div>
                    `;
                    return;
                }
                loadAdminPanel();
            } catch (e) {
                console.error('Ошибка проверки доступа:', e);
            }
        }
        
        let currentTab = 'masks';
        let masks = [];
        let routes = [];
        
                async function loadAdminPanel() {
            await Promise.all([
                loadMasks(),
                loadRoutes(),
                loadStats()
            ]);
            renderAdminPanel();
        }
        
        async function loadMasks() {
            const res = await fetch(`${API_BASE}/admin/masks?userId=${currentUserId}`);
            masks = await res.json();
        }
        
        async function loadRoutes() {
            const res = await fetch(`${API_BASE}/admin/routes?userId=${currentUserId}`);
            routes = await res.json();
        }
        
        async function loadStats() {
            const res = await fetch(`${API_BASE}/admin/stats?userId=${currentUserId}`);
            window.stats = await res.json();
        }

                async function refreshData() {
            showMessage('Обновление данных...', 'info');
            try {
                await Promise.all([
                    loadMasks(),
                    loadRoutes(),
                    loadStats()
                ]);
                renderAdminPanel();
                showMessage('Данные успешно обновлены!', 'success');
            } catch (e) {
                console.error('Refresh error:', e);
                showMessage('Ошибка обновления данных', 'error');
            }
        }
        
                function renderAdminPanel() {
            const html = `
                <div class="header">
                    <h1><i class="fas fa-shield-alt"></i> Админ-панель</h1>
                    <button class="back-btn" onclick="location.href='/'">← На главную</button>
                </div>
                
                <div class="admin-id-info">
                    <i class="fas fa-id-badge"></i> Ваш ID: ${currentUserId}
                </div>
                
                <div class="tabs">
                    <button class="tab-btn ${currentTab === 'masks' ? 'active' : ''}" onclick="switchTab('masks')">📋 Маски</button>
                    <button class="tab-btn ${currentTab === 'routes' ? 'active' : ''}" onclick="switchTab('routes')">🗺️ Маршруты</button>
                    <button class="tab-btn ${currentTab === 'stats' ? 'active' : ''}" onclick="switchTab('stats')">📊 Статистика</button>
                </div>
                
                <div id="masks-tab" class="tab-content ${currentTab === 'masks' ? 'active' : ''}">
                    <button class="btn-success" onclick="showAddMaskModal()" style="margin-bottom: 16px;">
                        <i class="fas fa-plus"></i> Добавить маску
                    </button>
                    <div id="masks-list">
                        ${renderMasksList()}
                    </div>
                </div>
                
                <div id="routes-tab" class="tab-content ${currentTab === 'routes' ? 'active' : ''}">
                    <button class="btn-success" onclick="showAddRouteModal()" style="margin-bottom: 16px;">
                        <i class="fas fa-plus"></i> Добавить маршрут
                    </button>
                    <div id="routes-list">
                        ${renderRoutesList()}
                    </div>
                </div>
                
                <div id="stats-tab" class="tab-content ${currentTab === 'stats' ? 'active' : ''}">
                    ${renderStats()}
                </div>
            `;
            document.getElementById('app').innerHTML = html;
        }
        
                function renderMasksList() {
            if (masks.length === 0) return '<p style="text-align: center; color: #64748b;">Нет масок</p>';
            
            return masks.map(mask => `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">${escapeHtml(mask.name)}</span>
                        <div>
                            ${!mask.isAvailable ? `<button class="btn-icon btn-publish" onclick="publishMask('${mask.id}')" title="Опубликовать"><i class="fas fa-cloud-upload-alt"></i></button>` : ''}
                            <button class="btn-icon" onclick="editMask('${mask.id}')" title="Редактировать"><i class="fas fa-edit"></i></button>
                            <button class="btn-icon btn-danger" onclick="deleteMask('${mask.id}')" title="Удалить"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div style="font-size: 12px; color: #64748b;">
                        <div>📍 ${mask.latitude}, ${mask.longitude}</div>
                        <div>📝 ${escapeHtml(mask.description || 'Без описания')}</div>
                        <div>${mask.isAvailable ? '<span style="color: #10B981;">✅ Опубликована</span>' : '<span style="color: #F59E0B;">⏳ Черновик</span>'}</div>
                    </div>
                </div>
            `).join('');
        }
        
                function renderRoutesList() {
            if (routes.length === 0) return '<p style="text-align: center; color: #64748b;">Нет маршрутов</p>';
            
            return routes.map(route => `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">${escapeHtml(route.name)}</span>
                        <div>
                            ${!route.isActive ? `<button class="btn-icon btn-publish" onclick="publishRoute('${route.id}')" title="Опубликовать"><i class="fas fa-cloud-upload-alt"></i></button>` : ''}
                            <button class="btn-icon" onclick="editRoute('${route.id}')" title="Редактировать"><i class="fas fa-edit"></i></button>
                            <button class="btn-icon btn-danger" onclick="deleteRoute('${route.id}')" title="Удалить"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div style="font-size: 12px; color: #64748b;">
                        <div>📏 ${route.distanceKm} км | ⏱️ ${route.durationMinutes} мин</div>
                        <div>📝 ${escapeHtml(route.description || 'Без описания')}</div>
                        <div>${route.isActive ? '<span style="color: #10B981;">✅ Опубликован</span>' : '<span style="color: #F59E0B;">⏳ Черновик</span>'}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderStats() {
            const stats = window.stats || {};
            return `
                <div class="stat-grid">
                    <div class="stat-card">
                        <div class="stat-value">${stats.totalUsers || 0}</div>
                        <div class="stat-label">Всего пользователей</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.totalActivations || 0}</div>
                        <div class="stat-label">Всего активаций</div>
                    </div>
                </div>
                
                <div class="card">
                    <h3 style="margin-bottom: 12px;">🔥 Популярные маски</h3>
                    ${(stats.popularMasks || []).map(m => `
                        <div class="list-item">
                            <span>${escapeHtml(m.name)}</span>
                            <span style="color: #3B82F6;">${m.count} активаций</span>
                        </div>
                    `).join('') || '<p style="color: #64748b;">Нет данных</p>'}
                </div>
                
                <div class="card">
                    <h3 style="margin-bottom: 12px;">🏆 Популярные маршруты</h3>
                    ${(stats.popularRoutes || []).map(r => `
                        <div class="list-item">
                            <span>${escapeHtml(r.name)}</span>
                            <span style="color: #3B82F6;">${r.count} прохождений</span>
                        </div>
                    `).join('') || '<p style="color: #64748b;">Нет данных</p>'}
                </div>
                
                <div class="card">
                    <h3 style="margin-bottom: 12px;">📅 Активации за 7 дней</h3>
                    ${(stats.dailyActivations || []).map(d => `
                        <div class="list-item">
                            <span>${d.date}</span>
                            <span style="color: #3B82F6;">${d.count} активаций</span>
                        </div>
                    `).join('') || '<p style="color: #64748b;">Нет данных</p>'}
                </div>
            `;
        }
        
        function switchTab(tab) {
            currentTab = tab;
            renderAdminPanel();
        }
        
        function showAddMaskModal() {
            showModal('Добавить маску', `
                <div class="form-group">
                    <label>Название *</label>
                    <input type="text" id="mask-name" placeholder="Например: Берёзовая">
                </div>
                <div class="form-group">
                    <label>Краткое описание</label>
                    <textarea id="mask-description" placeholder="Краткое описание маски"></textarea>
                </div>
                <div class="form-group">
                    <label>Полное описание</label>
                    <textarea id="mask-fullDescription" placeholder="Полное описание (после активации)"></textarea>
                </div>
                <div class="form-group">
                    <label>Широта *</label>
                    <input type="text" id="mask-latitude" placeholder="54.679629">
                </div>
                <div class="form-group">
                    <label>Долгота *</label>
                    <input type="text" id="mask-longitude" placeholder="20.463649">
                </div>
                <div class="form-group">
                    <label>Адрес</label>
                    <input type="text" id="mask-address" placeholder="ул. Берёзовая">
                </div>
                <div class="form-group">
                    <label>QR-код (уникальный)</label>
                    <input type="text" id="mask-qrCode" placeholder="MASK_001">
                </div>
                <div class="form-group">
                    <label>Цена (₽)</label>
                    <input type="number" id="mask-priceAmount" placeholder="15000">
                </div>
                <div class="form-group">
                    <label>Ссылка на Яндекс.Карты</label>
                    <input type="text" id="mask-yandexMapLink" placeholder="https://yandex.ru/maps/...">
                </div>
            `, async () => {
                const newMask = {
                    name: document.getElementById('mask-name').value,
                    description: document.getElementById('mask-description').value,
                    fullDescription: document.getElementById('mask-fullDescription').value,
                    latitude: parseFloat(document.getElementById('mask-latitude').value),
                    longitude: parseFloat(document.getElementById('mask-longitude').value),
                    address: document.getElementById('mask-address').value,
                    qrCode: document.getElementById('mask-qrCode').value,
                    priceAmount: parseInt(document.getElementById('mask-priceAmount').value) || 15000,
                    isAvailable: true,
                    yandexMapLink: document.getElementById('mask-yandexMapLink').value
                };
                
                const res = await fetch(`${API_BASE}/admin/masks?userId=${currentUserId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newMask)
                });
                
                if (res.ok) {
                    showMessage('Маска добавлена!', 'success');
                    loadMasks().then(() => renderAdminPanel());
                } else {
                    showMessage('Ошибка добавления', 'error');
                }
            });
        }
        
        function showAddRouteModal() {
            showModal('Добавить маршрут', `
                <div class="form-group">
                    <label>Название *</label>
                    <input type="text" id="route-name" placeholder="Например: Исторический центр">
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="route-description" placeholder="Описание маршрута"></textarea>
                </div>
                <div class="form-group">
                    <label>Сложность</label>
                    <select id="route-difficulty">
                        <option value="easy">Лёгкий</option>
                        <option value="medium">Средний</option>
                        <option value="hard">Сложный</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Длительность (минут)</label>
                    <input type="number" id="route-durationMinutes" placeholder="60">
                </div>
                <div class="form-group">
                    <label>Дистанция (км)</label>
                    <input type="text" id="route-distanceKm" placeholder="2.5">
                </div>
                <div class="form-group">
                    <label>Цвет (HEX)</label>
                    <input type="text" id="route-color" placeholder="#3B82F6">
                </div>
                <div class="form-group">
                    <label>Центр маршрута (широта)</label>
                    <input type="text" id="route-centerLat" placeholder="54.679629">
                </div>
                <div class="form-group">
                    <label>Центр маршрута (долгота)</label>
                    <input type="text" id="route-centerLng" placeholder="20.463649">
                </div>
            `, async () => {
                const newRoute = {
                    name: document.getElementById('route-name').value,
                    description: document.getElementById('route-description').value,
                    difficulty: document.getElementById('route-difficulty').value,
                    durationMinutes: parseInt(document.getElementById('route-durationMinutes').value) || 60,
                    distanceKm: parseFloat(document.getElementById('route-distanceKm').value) || 1,
                    color: document.getElementById('route-color').value || '#3B82F6',
                    centerLat: parseFloat(document.getElementById('route-centerLat').value) || 54.679629,
                    centerLng: parseFloat(document.getElementById('route-centerLng').value) || 20.463649,
                    zoom: 14,
                    isActive: true
                };
                
                const res = await fetch(`${API_BASE}/admin/routes?userId=${currentUserId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newRoute)
                });
                
                if (res.ok) {
                    showMessage('Маршрут добавлен!', 'success');
                    loadRoutes().then(() => renderAdminPanel());
                } else {
                    showMessage('Ошибка добавления', 'error');
                }
            });
        }
        
        async function deleteMask(id) {
            if (!confirm('Удалить маску? Это действие нельзя отменить.')) return;
            
            const res = await fetch(`${API_BASE}/admin/masks/${id}?userId=${currentUserId}`, {
                method: 'DELETE'
            });
            
            if (res.ok) {
                showMessage('Маска удалена', 'success');
                loadMasks().then(() => renderAdminPanel());
            } else {
                showMessage('Ошибка удаления', 'error');
            }
        }

                async function publishMask(id) {
            if (!confirm('Опубликовать маску? Она станет доступна в каталоге для всех пользователей.')) return;
            
            try {
                const res = await fetch(`${API_BASE}/admin/masks/${id}/publish?userId=${currentUserId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const result = await res.json();
                
                if (res.ok) {
                    showMessage(result.message || 'Маска опубликована!', 'success');
                    loadMasks().then(() => renderAdminPanel());
                } else {
                    showMessage(result.error || 'Ошибка публикации', 'error');
                }
            } catch (e) {
                showMessage('Ошибка сети', 'error');
            }
        }
        
                async function deleteRoute(id) {
            if (!confirm('Удалить маршрут? Это действие нельзя отменить.')) return;
            
            try {
                const res = await fetch(`${API_BASE}/admin/routes/${id}?userId=${currentUserId}`, {
                    method: 'DELETE'
                });
                
                if (res.ok) {
                    showMessage('Маршрут удалён', 'success');
                    await loadRoutes();
                    renderAdminPanel();
                } else {
                    showMessage('Ошибка удаления', 'error');
                }
            } catch (e) {
                showMessage('Ошибка сети', 'error');
            }
        }
        
        function editMask(id) {
            const mask = masks.find(m => m.id === id);
            if (!mask) return;
            
            showModal('Редактировать маску', `
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="mask-name" value="${escapeHtml(mask.name)}">
                </div>
                <div class="form-group">
                    <label>Краткое описание</label>
                    <textarea id="mask-description">${escapeHtml(mask.description || '')}</textarea>
                </div>
                <div class="form-group">
                    <label>Широта</label>
                    <input type="text" id="mask-latitude" value="${mask.latitude}">
                </div>
                <div class="form-group">
                    <label>Долгота</label>
                    <input type="text" id="mask-longitude" value="${mask.longitude}">
                </div>
                <div class="form-group">
                    <label>Адрес</label>
                    <input type="text" id="mask-address" value="${escapeHtml(mask.address || '')}">
                </div>
                <div class="form-group">
                    <label>Цена (₽)</label>
                    <input type="number" id="mask-priceAmount" value="${mask.priceAmount || 15000}">
                </div>
                <div class="form-group">
                    <label>Доступна для покупки</label>
                    <select id="mask-isAvailable">
                        <option value="1" ${mask.isAvailable ? 'selected' : ''}>Да</option>
                        <option value="0" ${!mask.isAvailable ? 'selected' : ''}>Нет</option>
                    </select>
                </div>
            `, async () => {
                const updatedMask = {
                    name: document.getElementById('mask-name').value,
                    description: document.getElementById('mask-description').value,
                    latitude: parseFloat(document.getElementById('mask-latitude').value),
                    longitude: parseFloat(document.getElementById('mask-longitude').value),
                    address: document.getElementById('mask-address').value,
                    priceAmount: parseInt(document.getElementById('mask-priceAmount').value),
                    isAvailable: document.getElementById('mask-isAvailable').value === '1'
                };
                
                const res = await fetch(`${API_BASE}/admin/masks/${id}?userId=${currentUserId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedMask)
                });
                
                if (res.ok) {
                    showMessage('Маска обновлена!', 'success');
                    loadMasks().then(() => renderAdminPanel());
                } else {
                    showMessage('Ошибка обновления', 'error');
                }
            });
        }
        
        function editRoute(id) {
            const route = routes.find(r => r.id === id);
            if (!route) return;
            
            showModal('Редактировать маршрут', `
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="route-name" value="${escapeHtml(route.name)}">
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="route-description">${escapeHtml(route.description || '')}</textarea>
                </div>
                <div class="form-group">
                    <label>Длительность (минут)</label>
                    <input type="number" id="route-durationMinutes" value="${route.durationMinutes}">
                </div>
                <div class="form-group">
                    <label>Дистанция (км)</label>
                    <input type="text" id="route-distanceKm" value="${route.distanceKm}">
                </div>
                <div class="form-group">
                    <label>Активен</label>
                    <select id="route-isActive">
                        <option value="1" ${route.isActive ? 'selected' : ''}>Да</option>
                        <option value="0" ${!route.isActive ? 'selected' : ''}>Нет</option>
                    </select>
                </div>
            `, async () => {
                const updatedRoute = {
                    name: document.getElementById('route-name').value,
                    description: document.getElementById('route-description').value,
                    durationMinutes: parseInt(document.getElementById('route-durationMinutes').value),
                    distanceKm: parseFloat(document.getElementById('route-distanceKm').value),
                    isActive: document.getElementById('route-isActive').value === '1'
                };
                
                const res = await fetch(`${API_BASE}/admin/routes/${id}?userId=${currentUserId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedRoute)
                });
                
                if (res.ok) {
                    showMessage('Маршрут обновлён!', 'success');
                    loadRoutes().then(() => renderAdminPanel());
                } else {
                    showMessage('Ошибка обновления', 'error');
                }
            });
        }
        
        let activeModal = null;
        
        function showModal(title, content, onSave) {
            const modalHtml = `
                <div id="admin-modal" class="modal-overlay">
                    <div class="modal-container">
                        <div class="modal-header">
                            <h3>${title}</h3>
                            <button class="btn-icon" onclick="closeModal()">&times;</button>
                        </div>
                        <div class="modal-content">
                            ${content}
                            <button class="btn-success" onclick="saveModal()" style="margin-top: 16px;">Сохранить</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            window.modalOnSave = onSave;
        }
        
        function closeModal() {
            const modal = document.getElementById('admin-modal');
            if (modal) modal.remove();
        }
        
        function saveModal() {
            if (window.modalOnSave) window.modalOnSave();
            closeModal();
        }
        
        let messageTimeout = null;
        
        function showMessage(text, type) {
            const existing = document.querySelector('.message');
            if (existing) existing.remove();
            if (messageTimeout) clearTimeout(messageTimeout);
            
            const msg = document.createElement('div');
            msg.className = `message message-${type}`;
            msg.innerHTML = text;
            document.querySelector('.container').insertBefore(msg, document.querySelector('.container').firstChild);
            
            messageTimeout = setTimeout(() => msg.remove(), 3000);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

                        async function publishRoute(id) {
            if (!confirm('Опубликовать маршрут? Он станет доступен пользователям.')) return;
            
            try {
                const res = await fetch(`${API_BASE}/admin/routes/${id}/publish?userId=${currentUserId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const result = await res.json();
                
                if (res.ok) {
                    showMessage(result.message || 'Маршрут опубликован!', 'success');
                    // Очищаем кеш и перезагружаем
                    await loadRoutes();
                    renderAdminPanel();
                } else {
                    showMessage(result.error || 'Ошибка публикации', 'error');
                }
            } catch (e) {
                showMessage('Ошибка сети', 'error');
            }
        }

                // Делаем функции глобальными для onclick
        window.switchTab = switchTab;
        window.showAddMaskModal = showAddMaskModal;
        window.showAddRouteModal = showAddRouteModal;
        window.deleteMask = deleteMask;
        window.deleteRoute = deleteRoute;
        window.editMask = editMask;
        window.editRoute = editRoute;
        window.publishMask = publishMask;
        window.publishRoute = publishRoute;
        window.closeModal = closeModal;
        window.saveModal = saveModal;
        window.showMessage = showMessage;
                window.refreshData = refreshData;
        window.refreshRoutes = refreshRoutes;
        
        init();
    </script>
</body>
</html>
