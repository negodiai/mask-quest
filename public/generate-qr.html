<!DOCTYPE html>
<html>
<head>
    <title>Генератор QR-кодов</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: monospace; background: #0f0f1e; color: white; padding: 20px; }
        .qr { display: inline-block; background: white; padding: 20px; margin: 10px; border-radius: 16px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Генератор QR-кодов для масок</h1>
    <div id="masks"></div>
    <script>
        async function loadMasks() {
            const res = await fetch('/api/masks/list');
            const masks = await res.json();
            const container = document.getElementById('masks');
            
            for (const mask of masks) {
                const div = document.createElement('div');
                div.className = 'qr';
                div.innerHTML = `
                    <div><strong>${mask.name}</strong><br>ID: ${mask.id}</div>
                    <div id="qr-${mask.id}"></div>
                    <button onclick="downloadQR('${mask.id}')">Скачать QR</button>
                `;
                container.appendChild(div);
                new QRCode(document.getElementById(`qr-${mask.id}`), {
                    text: mask.id,
                    width: 200,
                    height: 200
                });
            }
        }
        
        function downloadQR(maskId) {
            const canvas = document.querySelector(`#qr-${maskId} canvas`);
            if (canvas) {
                const link = document.createElement('a');
                link.download = `${maskId}.png`;
                link.href = canvas.toDataURL();
                link.click();
            }
        }
        
        loadMasks();
    </script>
</body>
</html>
