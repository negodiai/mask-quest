<!DOCTYPE html>
<html>
<head>
    <title>Генератор QR-кодов для масок</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #0f0f1e; color: white; padding: 20px; }
        .qr-container { display: inline-block; background: white; padding: 20px; border-radius: 16px; margin: 20px; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; }
        .grid { display: flex; flex-wrap: wrap; gap: 20px; }
    </style>
</head>
<body>
    <h1>Генератор QR-кодов для масок</h1>
    <button onclick="generateAll()">Сгенерировать все QR-коды</button>
    <div class="grid" id="qrcodes"></div>

    <script>
        const masks = [
            { id: 'mask_1', name: 'Берёзовая' },
            { id: 'mask_2', name: 'ВБ наш' },
            { id: 'mask_3', name: 'Вход спар' },
            { id: 'mask_4', name: 'Почта' },
            { id: 'mask_5', name: 'Цветы Голландии' },
            { id: 'mask_6', name: 'Калитка церковь' },
            { id: 'mask_7', name: 'Вход киноленд' },
            { id: 'mask_8', name: 'Кофейня на летнем' },
            { id: 'mask_9', name: 'Мост на летнем' },
            { id: 'mask_10', name: 'Еще кофейня летнее' }
        ];
        
        function generateAll() {
            const container = document.getElementById('qrcodes');
            container.innerHTML = '';
            
            masks.forEach(mask => {
                const div = document.createElement('div');
                div.className = 'qr-container';
                div.innerHTML = `<div id="qr_${mask.id}"></div><p><strong>${mask.name}</strong><br>Код: ${mask.id}</p>`;
                container.appendChild(div);
                
                new QRCode(document.getElementById(`qr_${mask.id}`), {
                    text: mask.id,
                    width: 150,
                    height: 150
                });
            });
        }
        
        generateAll();
    </script>
</body>
</html>
