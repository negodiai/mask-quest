<!DOCTYPE html>
<html>
<head>
    <title>Генератор QR-кодов</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: Arial; background: #0f0f1e; color: white; padding: 20px; }
        .qr-container { display: inline-block; background: white; padding: 20px; border-radius: 16px; margin: 10px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Генератор QR-кодов для масок</h1>
    <div id="qrs"></div>
    <script>
        const baseUrl = window.location.origin;
        const masks = ['mask_1', 'mask_2', 'mask_3', 'mask_4', 'mask_5', 'mask_6', 'mask_7', 'mask_8', 'mask_9', 'mask_10'];
        const container = document.getElementById('qrs');
        
        masks.forEach(mask => {
            const url = `${baseUrl}/scan/${mask}`;
            const div = document.createElement('div');
            div.className = 'qr-container';
            div.innerHTML = `<div><strong>${mask}</strong><br><div id="qr-${mask}"></div><br><a href="${url}" target="_blank">${url}</a></div>`;
            container.appendChild(div);
            new QRCode(document.getElementById(`qr-${mask}`), { text: url, width: 150, height: 150 });
        });
    </script>
</body>
</html>
